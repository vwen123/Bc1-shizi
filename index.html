<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小状元识字 - 快乐学习每一天</title>
    <!-- 预连接：提前建立连接，减少延迟 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://vwen123.github.io">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HanziWriter 延迟加载（只在笔顺弹窗用） -->
    <script defer src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- font-display:swap：字体未载入时先用系统字体，不阻塞渲染 -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700;900&display=swap&font-display=swap" rel="stylesheet">
    <style>
        :root { --primary:#3b82f6; --secondary:#f43f5e; --accent:#f59e0b; }
        body { font-family:'Noto Sans SC',sans-serif; background:#f8fafc; min-height:100vh; color:#1e293b; }
        .hanzi-font { font-family:'Ma Shan Zheng',cursive; }

        .lesson-card { transition:all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .lesson-card:hover { transform:translateY(-5px); box-shadow:0 12px 24px -10px rgba(59,130,246,0.3); }

        .rec-active { animation:recPulse 1.5s infinite; background-color:#ef4444 !important; color:#fff !important; }
        @keyframes recPulse {
            0%   { box-shadow:0 0 0 0 rgba(239,68,68,0.4); }
            70%  { box-shadow:0 0 0 15px rgba(239,68,68,0); }
            100% { box-shadow:0 0 0 0 rgba(239,68,68,0); }
        }

        .char-hit  { color:#10b981; font-weight:800; border-bottom:2px solid #10b981; }
        .char-miss { color:#cbd5e1; }
        .char-punc { color:#94a3b8; }

        .reward-bounce { animation:bounceIn 0.8s cubic-bezier(0.36,0,0.66,-0.56) both; }
        @keyframes bounceIn {
            0%   { opacity:0; transform:scale(0.3); }
            50%  { opacity:1; transform:scale(1.05); }
            70%  { transform:scale(0.9); }
            100% { transform:scale(1); }
        }

        #progressBar { transition:width 0.6s cubic-bezier(0.65,0,0.35,1); }
        .confetti { position:fixed; width:10px; height:10px; z-index:100; pointer-events:none; animation:fall 3s linear forwards; }
        @keyframes fall { 0%{transform:translateY(-10vh) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

        .actions-hidden  { opacity:0; pointer-events:none; transform:translateY(8px); transition:all 0.4s ease; }
        .actions-visible { opacity:1; pointer-events:auto; transform:translateY(0); }

        .skeleton { background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size:200% 100%; animation:loading 1.5s infinite; }
        @keyframes loading { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
</head>
<body>

<!-- ════════════ 界面一：登录与选课 ════════════ -->
<div id="screenStart" class="max-w-md mx-auto px-6 py-12">

        <div class="text-left mb-4">

        </div>

        <div class="text-left">
            <label class="text-sm font-bold text-slate-500 mb-3 block ml-2">选择今日课题</label>
            <div id="lessonMenu" class="space-y-3 max-h-[40vh] overflow-y-auto pr-1">
                <div class="text-center text-slate-300 py-8">
                    <div class="w-8 h-8 border-3 border-blue-300 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>

<!-- ════════════ 界面二：学习主界面 ════════════ -->

    <!-- 顶部导航 -->

        <div class="text-center">
            <h2 id="lessonTitle" class="text-xl font-black text-slate-800 leading-tight"></h2>
            <div id="studentLabel" class="text-[10px] uppercase tracking-widest text-blue-500 font-bold"></div>

    <!-- 进度条 -->

        <div class="bg-slate-200 rounded-full h-3 overflow-hidden shadow-inner">

            <h3 class="text-2xl font-black text-slate-800">金声朗读</h3>

    </section>

    <!-- 第三关：趣味游戏 -->
    <section class="pb-20">
        <div class="flex items-center gap-3 mb-6">
            <span class="w-10 h-10 bg-violet-500 text-white rounded-2xl flex items-center justify-center font-black shadow-lg shadow-violet-200">3</span>

                🖼️ 看图选词

            <button id="gameTab-pair" onclick="startGame('pair')"

        <div id="gameArea" class="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6 min-h-[280px] flex items-center justify-center">

                <div class="font-bold">选一个游戏开始挑战！</div>

<!-- ════════════ 笔顺弹窗 ════════════ -->
<div id="quizModal" class="hidden fixed inset-0 z-[100] bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-4">

            <div id="quiz-writer-container" class="bg-white border-8 border-blue-50 rounded-[2.5rem] shadow-inner p-6 mb-8 cursor-crosshair"></div>
        </div>

<!-- ════════════ 完成奖励 ════════════ -->
<div id="screenReward" class="hidden fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-6">
    <div class="reward-bounce bg-white rounded-[3rem] p-10 text-center max-w-sm w-full shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-400"></div>
        <div class="text-8xl mb-6">🏆</div>
        <h2 class="text-3xl font-black text-slate-800 mb-2">功成名就！</h2>
        <p id="rewardName" class="text-slate-500 mb-8"></p>
        <div class="bg-blue-50 rounded-3xl p-6 mb-8">
            <div class="text-sm font-bold text-blue-600 uppercase mb-1">状元总得分</div>
            <div id="rewardScore" class="text-5xl font-black text-blue-600">0</div>
        </div>
        <div id="leaderboardBox" class="hidden text-left mb-8">
            <div class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">🏅 本课排行榜 TOP 10</div>
            <div id="leaderboardList" class="space-y-1.5 max-h-56 overflow-y-auto pr-1"></div>
        </div>
        <button onclick="goHome()" class="w-full bg-slate-800 hover:bg-black text-white py-5 rounded-2xl font-black text-lg shadow-xl">
            返回首页
        </button>
    </div>
</div>

<script>
// ════════════════════════════════════════
//  Firebase 初始化
// ════════════════════════════════════════
firebase.initializeApp({
    apiKey:            "AIzaSyCVnBotyPuwS9xfUl7YCN2jS7gXUHIQyHc",
    authDomain:        "huawen-class.firebaseapp.com",
    projectId:         "huawen-class",
    storageBucket:     "huawen-class.firebasestorage.app",
    messagingSenderId: "606012248377",
    appId:             "1:606012248377:web:7f55bb58ed2abd1c4458e8"
});
const db = firebase.firestore();

// 填入 Google Apps Script Web App URL（部署后从 GAS 复制）
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwVY3EK9SqaaPKtpp9UJjRR859Fvs7oZLP4bxwh4IxFT_F6Z777e1FenY1LFduB5q1P/exec';

// 本校专属链接：index.html?school=yani 会自动锁定学校字段
const SCHOOL_PARAM_MAP = { yani: 'SJK(C) YANI' };

// ════════════════════════════════════════
//  应用状态
// ════════════════════════════════════════
let allLessons    = [];
let currentLesson = null;
let currentParas  = [];
let studentName   = '';
let school        = '';
let itemScores    = {};
let totalItems    = 0;
let currentAttemptId = null;
let activeQuizWriter = null;
let studentProgress  = {};
let activeQuizId     = null;
let _rec    = null;
let _recId  = null;
let _recStop = false;

// ════════════════════════════════════════
//  中文数字解析（用于排序）
// ════════════════════════════════════════
const CN_NUM = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
function parseLeadingCnNum(str) {
    const m = (str || '').match(/[一二三四五六七八九十]/);
    return m ? (CN_NUM[m[0]] || 999) : 999;
}
function parseUnitNum(unit) {
    const m = (unit || '').match(/第([一二三四五六七八九十]+)单元/);
    return m ? parseLeadingCnNum(m[1]) : 999;
}

// 计算课程的总学习项数（生词 + 句子，跟课中进度条算法一致）
function getTotalItems(lesson) {
    const paras = lesson.content.split(/(?<=[，。！？])/).map(s => s.trim()).filter(Boolean);
    return lesson.words.length + paras.length;
}

// ════════════════════════════════════════
//  初始化 — 从 Firestore 加载课程
// ════════════════════════════════════════
window.onload = async () => {
    const savedName   = localStorage.getItem('shizi_studentName');
    const savedSchool = localStorage.getItem('shizi_school');
    if (savedName)   document.getElementById('inputName').value   = savedName;
    if (savedSchool) document.getElementById('inputSchool').value = savedSchool;

    // 本校专属链接：?school=yani → 锁定学校字段
    const lockedSchool = SCHOOL_PARAM_MAP[new URLSearchParams(location.search).get('school')];
    if (lockedSchool) {
        const schoolInput = document.getElementById('inputSchool');
        schoolInput.value = lockedSchool;
        schoolInput.readOnly = true;
        schoolInput.classList.add('bg-slate-100', 'text-slate-400');
        document.getElementById('schoolLockHint').classList.remove('hidden');
    }

    // 姓名/学校填好后自动查询该生的学习进度
    document.getElementById('inputName').addEventListener('blur', loadStudentProgress);
    document.getElementById('inputSchool').addEventListener('blur', loadStudentProgress);

    try {
        const snap = await db.collection('lessons').get();
        allLessons = snap.docs
            .map(d => ({ lessonId: d.id, ...d.data() }))
            .filter(l => l.status === 'published')
            .sort((a, b) => {
                const ua = parseUnitNum(a.unit), ub = parseUnitNum(b.unit);
                if (ua !== ub) return ua - ub;
                return parseLeadingCnNum(a.title) - parseLeadingCnNum(b.title);
            });
        renderLessonMenu();
        if (savedName && savedSchool) loadStudentProgress();
    } catch(e) {
        document.getElementById('lessonMenu').innerHTML =
            '<div class="text-red-400 text-sm text-center py-6">课程加载失败，请检查网络</div>';
    }
};

// ════════════════════════════════════════
//  学习进度 — 已完成 / 完成百分比
// ════════════════════════════════════════
async function loadStudentProgress() {
    const s = document.getElementById('inputSchool').value.trim();
    const n = document.getElementById('inputName').value.trim();
    if (!s || !n || !allLessons.length) return;

    try {
        const snap = await db.collection('attempts')
            .where('school', '==', s)
            .where('studentName', '==', n)
            .get();

        studentProgress = {};
        snap.docs.forEach(d => {
            const a = d.data();
            const lesson = allLessons.find(l => l.lessonId === a.lessonId);
            if (!lesson) return;

            const total = getTotalItems(lesson);
            const requiredIds = [
                ...lesson.words.map((_, i) => `word-${i}`),
                ...Array.from({ length: total - lesson.words.length }, (_, i) => `para-${i}`)
            ];
            const done = requiredIds.filter(id => a.scores && a.scores[id] !== undefined).length;
            const pct  = Math.round(done / total * 100);

            const existing = studentProgress[a.lessonId];
            if (!existing || a.completedAt || pct > existing.pct) {
                studentProgress[a.lessonId] = { completed: !!a.completedAt, pct };
            }
        });
        renderLessonMenu();
    } catch(e) { /* 静默 */ }
}

function renderLessonMenu() {
    const menu = document.getElementById('lessonMenu');
    if (!allLessons.length) {
        menu.innerHTML = '<div class="text-slate-300 text-sm text-center py-8">老师还未发布课程</div>';
        return;
    }
    menu.innerHTML = '';
    let lastUnit = '';
    allLessons.forEach((l, i) => {
        if (l.unit !== lastUnit) {
            lastUnit = l.unit;
            const h = document.createElement('div');
            h.className = 'text-[10px] font-black text-slate-400 uppercase tracking-widest mt-5 mb-1 ml-1';
            h.textContent = l.unit;
            menu.appendChild(h);
        }
        const prog = studentProgress[l.lessonId];
        let badge = '';
        if (prog?.completed) {
            badge = `<span class="text-[10px] font-black text-emerald-500 bg-emerald-50 px-2 py-1 rounded-full whitespace-nowrap">✅ 已完成</span>`;
        } else if (prog && prog.pct > 0) {
            badge = `<span class="text-[10px] font-black text-amber-500 bg-amber-50 px-2 py-1 rounded-full whitespace-nowrap">进度 ${prog.pct}%</span>`;
        }

        const card = document.createElement('div');
        card.className = 'lesson-card bg-white border border-slate-100 rounded-2xl p-5 flex justify-between items-center cursor-pointer shadow-sm';
        card.innerHTML = `
            <div class="font-bold text-slate-700">${l.title}</div>
            <div class="flex items-center gap-2">
                ${badge}
                <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center shrink-0">
                    <i class="fas fa-play text-[10px]"></i>
                </div>
            </div>`;
        card.onclick = () => startLesson(i);
        menu.appendChild(card);
    });
}

// ════════════════════════════════════════
//  开始课程
// ════════════════════════════════════════
function startLesson(idx) {
    school      = document.getElementById('inputSchool').value.trim();
    studentName = document.getElementById('inputName').value.trim();
    if (!school)      { showMsg('请输入学校名称！'); return; }
    if (!studentName) { showMsg('状元公，请先赐名哦！'); return; }
    localStorage.setItem('shizi_school',      school);
    localStorage.setItem('shizi_studentName', studentName);

    currentLesson    = allLessons[idx];
    itemScores       = {};
    currentAttemptId = null;

    // 按逗号/句号/感叹号/问号分句，一句句读
    currentParas = currentLesson.content
        .split(/(?<=[，。！？])/)
        .map(s => s.trim()).filter(Boolean);

    totalItems = currentLesson.words.length + currentParas.length;

    document.getElementById('lessonTitle').textContent  = currentLesson.title;
    document.getElementById('studentLabel').textContent = `学习者：${studentName}`;
    document.getElementById('totalScore').textContent   = '0';

    renderWords();
    renderParas();
    updateProgress();
    showScreen('screenLearn');

    // 建立学生练习记录
    saveAttemptToGAS();
}

// ════════════════════════════════════════
//  渲染生词卡
// ════════════════════════════════════════
function renderWords() {
    const grid = document.getElementById('wordGrid');
    grid.innerHTML = '';
    currentLesson.words.forEach((w, i) => {
        const id   = `word-${i}`;
        const card = document.createElement('div');
        card.className = 'bg-white rounded-[2.5rem] overflow-hidden shadow-md border border-slate-100 flex flex-col';
        card.innerHTML = `
            <!-- 图片区 -->
            <div id="img-box-${id}" class="h-52 relative flex items-center justify-center overflow-hidden ${w.imgUrl ? '' : 'bg-blue-50'}">
                ${w.imgUrl
                    ? `<img src="${w.imgUrl}" loading="lazy" class="w-full h-full object-cover"
                           onerror="this.parentNode.innerHTML='<span class=\\'text-7xl\\'>${w.emoji||'📚'}</span>'">`
                    : `<span class="text-7xl">${w.emoji || '📚'}</span>`}
            </div>
            <!-- 信息区 -->
            <div class="p-6 text-center flex-1 flex flex-col">
                <div class="text-rose-500 font-black text-sm mb-1">${w.pinyin}</div>
                <div class="hanzi-font text-4xl text-slate-800 mb-4">${w.word}</div>
                <div id="display-${id}" class="text-sm font-bold tracking-widest min-h-[1.5rem] mb-2"></div>
                <div id="score-${id}" class="text-xs font-bold text-slate-300 mb-4">准备朗读...</div>
                <div id="actions-${id}" class="actions-visible mt-auto grid grid-cols-3 gap-3">
                    <button onclick="speak('${w.word}')"
                        class="aspect-square rounded-2xl bg-blue-50 text-blue-500 hover:bg-blue-100 flex items-center justify-center transition-all">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button onclick="startQuiz('${id}','${w.word[0]}')"
                        class="aspect-square rounded-2xl bg-amber-50 text-amber-500 hover:bg-amber-100 flex items-center justify-center transition-all">
                        <i class="fas fa-pen-nib"></i>
                    </button>

// ════════════════════════════════════════
//  TTS — Web Speech API
// ════════════════════════════════════════
function speak(text) {
    window.speechSynthesis.cancel();
    const u  = new SpeechSynthesisUtterance(text);
    u.lang   = 'zh-CN';
    u.rate   = 0.85;
    window.speechSynthesis.speak(u);
}

// ════════════════════════════════════════
//  朗读识别 + 实时评分
// ════════════════════════════════════════
function startRecognition(target, id) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showMsg('请使用 Chrome 或 Edge 浏览器'); return; }

    const btn     = document.getElementById(`btn-${id}`);
    const display = document.getElementById(`display-${id}`);
    const scoreEl = document.getElementById(`score-${id}`);
    if (!btn) return;

    // 点同一按钮 = 手动停止
    if (_recId === id && _rec) {
        _recStop = true;
        _rec.stop();
        return;
    }
    // 停止其他录音
    if (_rec) { _recStop = true; try { _rec.stop(); } catch(e) {} _rec = null; _recId = null; }

    const recognition          = new SR();
    recognition.lang           = 'zh-CN';
    recognition.continuous     = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 3;   // 取最佳候选，提高准确率

    _rec     = recognition;
    _recId   = id;
    _recStop = false;

    const isSquare = btn.classList.contains('aspect-square');
    const origBg   = isSquare ? 'bg-rose-50 text-rose-500 hover:bg-rose-100'
                              : 'bg-rose-500 text-white hover:bg-rose-600 shadow-lg shadow-rose-100';
    const recBg    = 'bg-red-500 text-white';

    btn.className = btn.className.replace(origBg, recBg) + ' rec-active';
    btn.innerHTML = isSquare ? '<i class="fas fa-stop"></i>'
                             : '<i class="fas fa-stop mr-2"></i>停止';
    if (display) display.innerHTML =
        '<span class="text-slate-400 text-sm animate-pulse">🎤 请开始朗读...</span>';

    let accumulated  = '';
    let silenceTimer = null;

    const restoreBtn = () => {
        btn.classList.remove('rec-active');
        btn.className = btn.className.replace(recBg, origBg).replace(' rec-active', '');
        btn.innerHTML = isSquare ? '<i class="fas fa-microphone"></i>'
                                 : '<i class="fas fa-microphone mr-2"></i>朗读';
    };

    const finish = (spoken) => {
        if (_rec !== recognition) return;
        _rec = null; _recId = null;
        clearTimeout(silenceTimer);
        restoreBtn();

        const text = spoken.trim();
        if (!text) {
            if (display) display.innerHTML =
                '<span class="text-slate-300 text-sm">没有识别到声音，请靠近麦克风再试 🎤</span>';
            return;
        }
        const score = calcScore(target, text);
        const stars = score >= 90 ? 5 : score >= 75 ? 4 : score >= 55 ? 3 : score >= 30 ? 2 : 1;
        const msgs  = ['再来一次！🌈','继续练习！💪','不错，加油！😊','读得很好！👍','完美！🌟'];
        if (display) display.innerHTML = highlightMatch(target, text);
        if (scoreEl) scoreEl.innerHTML = `
            <div class="flex items-center flex-wrap gap-1.5 mt-1">
                <span class="text-amber-400 text-lg leading-none">${'⭐'.repeat(stars)}<span class="opacity-20">${'☆'.repeat(5-stars)}</span></span>
                <span class="font-black text-slate-700">${score}分</span>
                <span class="text-slate-400 text-xs">${msgs[stars-1]}</span>
            </div>
            <div class="text-slate-300 text-xs mt-0.5 truncate">识别：${text}</div>`;
        updateItemScore(id, score);
        saveAttemptToGAS();
        checkAllDone();
    };

    recognition.onspeechstart = () => {
        if (display && !accumulated)
            display.innerHTML = '<span class="text-blue-400 text-sm"><i class="fas fa-circle text-red-500 animate-pulse text-xs mr-1"></i>检测到声音，继续读...</span>';
    };

    recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) {
                // 从多个候选中选得分最高的
                let best = e.results[i][0].transcript;
                let bestScore = calcScore(target, best);
                for (let j = 1; j < e.results[i].length; j++) {
                    const alt = e.results[i][j].transcript;
                    const s   = calcScore(target, alt);
                    if (s > bestScore) { bestScore = s; best = alt; }
                }
                accumulated += best;
            } else {
                interim += e.results[i][0].transcript;
            }
        }
        if (display && (accumulated + interim))
            display.innerHTML = highlightMatch(target, accumulated + interim);

        // 停顿 2.5 秒后结束（原 1.8 秒，小朋友需要更多时间）
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
            _recStop = true;
            try { recognition.stop(); } catch(e) {}
        }, 2500);
    };

    recognition.onerror = (e) => {
        if (_rec !== recognition) return;
        _rec = null; _recId = null;
        clearTimeout(silenceTimer);
        restoreBtn();
        const errMsgs = {
            'not-allowed':   '请在浏览器设置中允许使用麦克风 🎤',
            'no-speech':     '没有检测到声音，请再试一次',
            'network':       '网络问题，请检查连接',
            'audio-capture': '无法访问麦克风',
            'aborted':       ''
        };
        const msg = errMsgs[e.error] ?? '识别出错，请重试';
        if (msg && display) display.innerHTML = `<span class="text-red-400 text-sm">${msg}</span>`;
    };

    recognition.onend = () => {
        if (_rec !== recognition) return;
        if (!_recStop) {
            // 浏览器意外断开 → 无缝重启
            try { recognition.start(); return; } catch(e) { /* 重启失败则结束 */ }
        }
        finish(accumulated);
    };

    try { recognition.start(); }
    catch(e) { _rec = null; _recId = null; showMsg('无法启动录音：' + e.message); }
}

// ── 字符高亮（按顺序匹配，颜色更准确）────────────────────────
function highlightMatch(target, spoken) {
    if (!spoken) return '';
    const cleanS = spoken.replace(/\s/g, '');
    // 顺序扫描：目标文字在识别结果中是否按顺序出现
    const sChars = [...cleanS];
    let si = 0;
    return [...target].map(c => {
        if (/[，。！？、\s]/.test(c)) return `<span class="char-punc">${c}</span>`;
        while (si < sChars.length && sChars[si] !== c) si++;
        if (si < sChars.length) { si++; return `<span class="char-hit">${c}</span>`; }
        return `<span class="char-miss">${c}</span>`;
    }).join('');
}

// ── 评分（顺序匹配 60% + 字符匹配 40%）──────────────────────
function calcScore(target, spoken) {
    const clean = s => [...s].filter(c => /[一-鿿]/.test(c));
    const t = clean(target);
    const s = clean(spoken);
    if (!t.length) return 0;
    if (!s.length) return 0;

    // 顺序匹配（按顺序找到多少目标字）
    let si = 0, seqHits = 0;
    for (const tc of t) {
        while (si < s.length && s[si] !== tc) si++;
        if (si < s.length) { seqHits++; si++; }
    }

    // 字符匹配（不管顺序）
    let setHits = 0;
    const sTemp = [...s];
    for (const tc of t) {
        const idx = sTemp.indexOf(tc);
        if (idx !== -1) { setHits++; sTemp.splice(idx, 1); }
    }

    const score = (seqHits / t.length * 0.6 + setHits / t.length * 0.4) * 100;
    return Math.round(Math.min(100, score));
}

function startQuiz(id, char) {
    activeQuizId = id;

    const container = document.getElementById('quiz-writer-container');
    const status    = document.getElementById('quiz-status');
    container.innerHTML = '';
    status.textContent  = '小状元请看，老师先演示一遍...';
    status.className    = 'text-blue-500 font-bold animate-pulse';
    modal.classList.remove('hidden');

    const writer = HanziWriter.create('quiz-writer-container', char, {
        width:300, height:300, padding:25, strokeColor:'#3b82f6',
        outlineColor:'#f1f5f9', drawingColor:'#1e293b', drawingWidth:14,
        showOutline:true, showCharacter:false
    });
    activeQuizWriter = writer;

    setTimeout(() => {
        writer.animateCharacter({
            onComplete: () => {
                speak('现在轮到你写啦');
                status.textContent = '演示完毕！请按笔顺书写';
                status.className   = 'text-amber-500 font-black animate-bounce';
                writer.quiz({
                    onComplete: () => {
                        status.textContent = '✨ 妙笔生花！写得真好！';
                        status.className   = 'text-green-500 font-black';
                        speak('太棒了');
                        updateItemScore(activeQuizId + '-quiz', 100);
                        const sb = document.getElementById(`score-${activeQuizId}`);
                        if (sb) sb.innerHTML = `<span class="text-green-500">✍️ 临摹完成</span>`;
                        setTimeout(() => { closeQuiz(); checkAllDone(); }, 1500);
                    }
                });
            }
        });
    }, 500);
}

function resetQuiz() { if (activeQuizWriter) { activeQuizWriter.cancelQuiz(); activeQuizWriter.quiz(); } }
function closeQuiz()  { document.getElementById('quizModal').classList.add('hidden'); if (activeQuizWriter) activeQuizWriter.cancelQuiz(); }

// ════════════════════════════════════════
//  分数管理
// ════════════════════════════════════════
function updateItemScore(id, score) {
    if (!itemScores[id] || score > itemScores[id]) {
        itemScores[id] = score;
        const total = Object.values(itemScores).reduce((a, b) => a + b, 0);
        document.getElementById('totalScore').textContent = total;
        updateProgress();
    }
}

function updateProgress() {
    // 计进度：单词录音 + 段落录音（笔顺作为额外奖励）
    const requiredIds = [
        ...currentLesson.words.map((_, i) => `word-${i}`),
        ...currentParas.map((_, i) => `para-${i}`)
    ];
    const done = requiredIds.filter(id => itemScores[id] !== undefined).length;
    const pct  = Math.round(done / totalItems * 100);
    document.getElementById('progressBar').style.width = `${pct}%`;
    document.getElementById('progressText').textContent = `${pct}%`;
}

function checkAllDone() {
    const requiredIds = [
        ...currentLesson.words.map((_, i) => `word-${i}`),
        ...currentParas.map((_, i) => `para-${i}`)
    ];
    if (requiredIds.every(id => itemScores[id] !== undefined)) {
        const total = Object.values(itemScores).reduce((a, b) => a + b, 0);
        saveAttemptToGAS(true);
        setTimeout(() => {
            document.getElementById('rewardName').textContent  = `${studentName} 功德圆满，全课通关！`;
            document.getElementById('rewardScore').textContent = total;
            showScreen('screenReward');
            launchConfetti();
            loadLeaderboard(currentLesson.lessonId);
        }, 1000);
    }
}

// ════════════════════════════════════════
//  本课排行榜 TOP 10
// ════════════════════════════════════════
async function loadLeaderboard(lessonId) {
    const box  = document.getElementById('leaderboardBox');
    const list = document.getElementById('leaderboardList');
    try {
        const snap = await db.collection('attempts').where('lessonId', '==', lessonId).get();

        // 同一学生可能多次练习，取最高分
        const best = {};
        snap.docs.forEach(d => {
            const a = d.data();
            if (!a.completedAt) return;
            const key = `${a.school || ''}__${a.studentName}`;
            if (!best[key] || (a.totalScore || 0) > (best[key].totalScore || 0)) best[key] = a;
        });

        const ranked = Object.values(best)
            .sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0))
            .slice(0, 10);

        if (!ranked.length) { box.classList.add('hidden'); return; }

        const medals = ['🥇', '🥈', '🥉'];
        list.innerHTML = ranked.map((a, i) => {
            const isMe = a.studentName === studentName && a.school === school;
            return `
            <div class="flex items-center justify-between px-3 py-2 rounded-xl ${isMe ? 'bg-blue-50 border-2 border-blue-200' : 'bg-slate-50'}">
                <div class="flex items-center gap-2 min-w-0">
                    <span class="w-6 text-center shrink-0 ${i < 3 ? 'text-lg' : 'text-xs font-black text-slate-400'}">${medals[i] || (i + 1)}</span>
                    <div class="min-w-0">
                        <div class="font-bold text-slate-700 text-sm truncate">${a.studentName}${isMe ? '（我）' : ''}</div>
                        <div class="text-[10px] text-slate-400 truncate">${a.school || '—'}</div>
                    </div>
                </div>
                <div class="font-black text-blue-600 shrink-0 ml-2">${a.totalScore ?? 0}</div>
            </div>`;
        }).join('');
        box.classList.remove('hidden');
    } catch(e) { box.classList.add('hidden'); }
}

// ════════════════════════════════════════
//  GAS 数据存储
// ════════════════════════════════════════
async function saveAttemptToGAS(completed = false) {
    const total = Object.values(itemScores).reduce((a, b) => a + b, 0);
    try {
        if (!currentAttemptId) {
            // 新建练习记录
            const ref = await db.collection('attempts').add({
                lessonId:    currentLesson.lessonId,
                lessonTitle: currentLesson.title,
                unit:        currentLesson.unit,
                school,
                studentName,
                scores:      itemScores,
                totalScore:  total,
                startedAt:   firebase.firestore.FieldValue.serverTimestamp(),
                completedAt: completed ? firebase.firestore.FieldValue.serverTimestamp() : null
            });
            currentAttemptId = ref.id;
        } else {
            // 更新现有记录
            const update = { scores: itemScores, totalScore: total };
            if (completed) update.completedAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection('attempts').doc(currentAttemptId).update(update);
        }
    } catch(e) { /* 静默 */ }

    // 完成时写入 Google Sheets（fire-and-forget，不阻塞 UI）
    if (completed) sendToSheet(total);
}

function sendToSheet(total) {
    if (!GAS_URL) return;
    const wordTotal = currentLesson.words.reduce((s, _, i) => s + (itemScores[`word-${i}`] || 0), 0);
    const paraTotal = currentParas.reduce((s, _, i) => s + (itemScores[`para-${i}`] || 0), 0);
    const gameTotal = (itemScores['game-img'] || 0) + (itemScores['game-audio'] || 0);
    fetch(GAS_URL, {
        method:  'POST',
        mode:    'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify({
            school, studentName,
            unit:        currentLesson.unit,
            lessonTitle: currentLesson.title,
            totalScore:  total,
            submittedAt: new Date().toLocaleString('zh-CN', { hour12: false }),
            wordTotal, paraTotal, gameTotal
        })
    }).catch(() => {});
}

// ════════════════════════════════════════
//  趣味游戏
// ════════════════════════════════════════
const shuffle = arr => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
};

let gs = {};   // game state

function startGame(type) {
    ['img','pair'].forEach(t => {
        const tab = document.getElementById('gameTab-' + t);
        tab.className = t === type
            ? 'flex-1 py-3 rounded-2xl bg-violet-500 text-white font-black text-sm shadow-lg shadow-violet-100 transition-all'
            : 'flex-1 py-3 rounded-2xl bg-slate-100 text-slate-500 font-black text-sm transition-all hover:bg-slate-200';
    });
    type === 'img' ? initImgGame() : initAudioGame();
}

// ── 看图选词 ──────────────────────────────────────────────────
function initImgGame() {
    const words = currentLesson?.words;
    if (!words?.length) return;
    gs.img = { order: shuffle(words.map((_, i) => i)), cur: 0, score: 0 };
    renderImgRound();
}

function renderImgRound() {
    const { order, cur, score } = gs.img;
    const words  = currentLesson.words;
    const area   = document.getElementById('gameArea');
    const total  = order.length;

    if (cur >= total) {
        const pct = Math.round(score / total * 100);
        area.innerHTML = `
        <div class="text-center py-6 w-full">
            <div class="text-6xl mb-3">${pct >= 75 ? '🎉' : pct >= 50 ? '😊' : '💪'}</div>
            <div class="text-3xl font-black text-violet-600 mb-1">${score} / ${total}</div>
            <div class="text-slate-400 mb-6">看图选词完成！</div>
            <button onclick="initImgGame()"
                class="px-8 py-3 bg-violet-500 text-white rounded-2xl font-black hover:bg-violet-600 transition-all">
                再来一次
            </button>
        </div>`;
        updateItemScore('game-img', pct);
        saveAttemptToGAS();
        checkAllDone();
        return;
    }

    const targetIdx = order[cur];
    const target    = words[targetIdx];
    const others    = shuffle(words.map((_, i) => i).filter(i => i !== targetIdx)).slice(0, 3);
    const opts      = shuffle([targetIdx, ...others]);
    const dots      = Array.from({ length: total }, (_, i) =>
        `<div class="w-2 h-2 rounded-full ${i < cur ? 'bg-violet-400' : i === cur ? 'bg-violet-600' : 'bg-slate-200'}"></div>`
    ).join('');

    area.innerHTML = `
    <div class="w-full">
        <div class="flex justify-between items-center mb-4">
            <span class="text-xs font-bold text-slate-400">第 ${cur+1} / ${total} 题</span>
            <div class="flex gap-1">${dots}</div>
            <span class="text-xs font-bold text-violet-600">${score} 分</span>
        </div>

        <!-- 大图 -->
        <div class="rounded-2xl overflow-hidden mb-4 bg-slate-100 flex items-center justify-center" style="height:340px">
            ${target.imgUrl
                ? `<img src="${target.imgUrl}" class="max-w-full max-h-full object-contain"
                       onerror="this.parentNode.innerHTML='<span style=\\'font-size:6rem\\'>${target.emoji||'📚'}</span>'">`
                : `<span style="font-size:6rem">${target.emoji || '📚'}</span>`}
        </div>
        <p class="text-center text-xs text-slate-400 mb-4">这是哪个词语？</p>

        <!-- 词语选项（汉字，不显示拼音） -->
        <div class="grid grid-cols-2 gap-3">
            ${opts.map(idx => {
                const w = words[idx];
                return `<button onclick="answerImg(this,${idx},${targetIdx})"
                    class="game-opt rounded-2xl border-2 border-slate-100 hover:border-violet-300
                           transition-all bg-white py-5 text-center">
                    <span class="hanzi-font text-3xl text-slate-800">${w.word}</span>
                </button>`;
            }).join('')}
        </div>
    </div>`;
}

function answerImg(btn, selected, correct) {
    document.querySelectorAll('.game-opt').forEach(b => { b.onclick = null; b.style.pointerEvents = 'none'; });
    if (selected === correct) {
        gs.img.score++;
        btn.classList.add('border-green-400', 'bg-green-50');
        btn.innerHTML += '<div class="text-green-500 font-black text-center py-1 text-sm">✓ 正确！</div>';
    } else {
        btn.classList.add('border-red-400', 'bg-red-50');
        btn.innerHTML += '<div class="text-red-400 font-bold text-center py-1 text-sm">✗ 再想想</div>';
    }
    setTimeout(() => { gs.img.cur++; renderImgRound(); }, 900);
}

// ── 听读选词 ──────────────────────────────────────────────────
function initAudioGame() {
    const words = currentLesson?.words;
    if (!words?.length) return;
    gs.audio = { order: shuffle(words.map((_, i) => i)), cur: 0, score: 0 };
    renderAudioRound();
}

function renderAudioRound() {
    const { order, cur, score } = gs.audio;
    const words = currentLesson.words;
    const area  = document.getElementById('gameArea');
    const total = order.length;

    if (cur >= total) {
        const pct = Math.round(score / total * 100);
        area.innerHTML = `
        <div class="text-center py-6 w-full">
            <div class="text-6xl mb-3">${pct >= 75 ? '🎉' : pct >= 50 ? '😊' : '💪'}</div>
            <div class="text-3xl font-black text-violet-600 mb-1">${score} / ${total}</div>
            <div class="text-slate-400 mb-6">听读选词完成！</div>
            <button onclick="initAudioGame()"
                class="px-8 py-3 bg-violet-500 text-white rounded-2xl font-black hover:bg-violet-600 transition-all">
                再来一次
            </button>
        </div>`;
        updateItemScore('game-audio', pct);
        saveAttemptToGAS();
        checkAllDone();
        return;
    }

    const targetIdx = order[cur];
    const target    = words[targetIdx];
    const others    = shuffle(words.map((_, i) => i).filter(i => i !== targetIdx)).slice(0, 3);
    const opts      = shuffle([targetIdx, ...others]);
    const dots      = Array.from({ length: total }, (_, i) =>
        `<div class="w-2 h-2 rounded-full ${i < cur ? 'bg-violet-400' : i === cur ? 'bg-violet-600' : 'bg-slate-200'}"></div>`
    ).join('');

    area.innerHTML = `
    <div class="w-full">
        <div class="flex justify-between items-center mb-4">
            <span class="text-xs font-bold text-slate-400">第 ${cur+1} / ${total} 题</span>
            <div class="flex gap-1">${dots}</div>
            <span class="text-xs font-bold text-violet-600">${score} 分</span>
        </div>

        <!-- 播放按钮 -->
        <div class="flex flex-col items-center mb-6 py-4">
            <button onclick="speak('${target.word}')"
                class="w-28 h-28 rounded-full bg-violet-100 hover:bg-violet-200 text-violet-600
                       flex items-center justify-center transition-all shadow-lg shadow-violet-100 mb-3">
                <i class="fas fa-volume-up text-5xl"></i>
            </button>
            <p class="text-xs text-slate-400">点击播放，选出你听到的词语</p>
        </div>

        <!-- 词语选项（汉字，不给拼音提示） -->
        <div class="grid grid-cols-2 gap-3">
            ${opts.map(idx => {
                const w = words[idx];
                return `<button onclick="answerAudio(this,${idx},${targetIdx})"
                    class="game-opt rounded-2xl border-2 border-slate-100 hover:border-violet-300
                           transition-all bg-white py-5 text-center">
                    <span class="hanzi-font text-3xl text-slate-800">${w.word}</span>
                </button>`;
            }).join('')}
        </div>
    </div>`;

    // 进入题目自动播放
    setTimeout(() => speak(target.word), 300);
}

function answerAudio(btn, selected, correct) {
    document.querySelectorAll('.game-opt').forEach(b => { b.onclick = null; b.style.pointerEvents = 'none'; });
    if (selected === correct) {
        gs.audio.score++;
        btn.classList.add('border-green-400', 'bg-green-50');
        btn.innerHTML += '<div class="text-green-500 font-black text-center text-sm mt-2">✓ 正确！</div>';
    } else {
        btn.classList.add('border-red-400', 'bg-red-50');
        btn.innerHTML += '<div class="text-red-400 font-bold text-center text-sm mt-2">✗ 再想想</div>';
    }
    setTimeout(() => { gs.audio.cur++; renderAudioRound(); }, 900);
}

function showMsg(msg) {
    const m = document.createElement('div');
    m.className = 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-2xl shadow-2xl z-[150] font-bold text-sm';
    m.textContent = msg;
    document.body.appendChild(m);
    setTimeout(() => m.remove(), 2500);
}
</script>
</body>
</html>
