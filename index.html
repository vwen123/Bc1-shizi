<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小状元识字</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: #f0f7ff; min-height: 100vh; }
        .hanzi { font-family: 'Ma Shan Zheng', cursive; }

        /* 课程卡 */
        .lesson-card { transition: all 0.2s; cursor: pointer; }
        .lesson-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(59,130,246,0.15); border-color: #3b82f6; }

        /* 录音动画 */
        .rec-pulse { animation: recPulse 1s infinite; }
        @keyframes recPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.05)} }

        /* 字符匹配 */
        .char-hit  { color:#16a34a; font-weight:bold; }
        .char-miss { color:#d1d5db; }
        .char-punc { color:#9ca3af; }

        /* 奖励弹窗 */
        .reward-in { animation: rewardPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes rewardPop { from{opacity:0;transform:scale(0.6)} to{opacity:1;transform:scale(1)} }

        /* 彩屑 */
        .confetti { position:fixed; width:8px; height:8px; border-radius:2px; animation:fall 2.5s linear forwards; }
        @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

        /* 进度条 */
        #progressBar { transition: width 0.5s ease; }

        /* 生词卡渐变 */
        .grad-0{background:linear-gradient(135deg,#667eea,#764ba2)}
        .grad-1{background:linear-gradient(135deg,#f093fb,#f5576c)}
        .grad-2{background:linear-gradient(135deg,#4facfe,#00f2fe)}
        .grad-3{background:linear-gradient(135deg,#43e97b,#38f9d7)}
        .grad-4{background:linear-gradient(135deg,#fa709a,#fee140)}
        .grad-5{background:linear-gradient(135deg,#a18cd1,#fbc2eb)}
    </style>
</head>
<body>

<!-- ════════════════════════════════════════
     界面一：登录与选课
════════════════════════════════════════ -->
<div id="screenStart" class="max-w-xl mx-auto px-4 py-10">
    <div class="bg-white rounded-[2rem] shadow-xl border-t-8 border-blue-500 p-8">
        <h1 class="text-4xl font-black text-blue-600 text-center mb-8 tracking-wider">🌟 小状元识字</h1>

        <label class="text-sm font-bold text-gray-500 block mb-1 ml-1">第一步：输入你的名字</label>
        <input id="inputName" type="text" placeholder="请输入名字…" maxlength="10"
            class="w-full p-4 border-2 border-blue-100 rounded-2xl text-center text-xl focus:outline-none focus:border-blue-400 bg-blue-50/30 mb-6">

        <label class="text-sm font-bold text-gray-500 block mb-3 ml-1">第二步：选择课文</label>
        <div id="lessonMenu" class="space-y-3"></div>
    </div>
</div>

<!-- ════════════════════════════════════════
     界面二：学习主界面
════════════════════════════════════════ -->
<div id="screenLearn" class="hidden max-w-5xl mx-auto px-4 py-6">

    <!-- 顶部导航 -->
    <div class="bg-white rounded-2xl shadow-sm p-4 mb-6 flex items-center justify-between">
        <button onclick="goHome()" class="text-blue-500 font-bold text-sm flex items-center gap-1 hover:text-blue-700">
            <i class="fas fa-chevron-left"></i> 返回
        </button>
        <div class="text-center">
            <div id="lessonTitle" class="font-black text-gray-800 text-lg"></div>
            <div id="studentLabel" class="text-xs text-gray-400"></div>
        </div>
        <div class="text-right">
            <div class="text-xs text-gray-400">总积分</div>
            <div id="totalScore" class="text-2xl font-black text-orange-500">0</div>
        </div>
    </div>

    <!-- 进度条 -->
    <div class="bg-gray-200 rounded-full h-2 mb-6 overflow-hidden">
        <div id="progressBar" class="bg-blue-500 h-full rounded-full" style="width:0%"></div>
    </div>

    <!-- 第一关：生词 -->
    <section class="mb-10">
        <h2 class="text-lg font-black text-blue-600 mb-4 flex items-center gap-2">
            <span class="bg-blue-600 text-white text-sm px-3 py-1 rounded-full">第一关</span> 认读生词
        </h2>
        <div id="wordGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </section>

    <!-- 第二关：朗读 -->
    <section class="pb-16">
        <h2 class="text-lg font-black text-red-500 mb-4 flex items-center gap-2">
            <span class="bg-red-500 text-white text-sm px-3 py-1 rounded-full">第二关</span> 朗读挑战
        </h2>
        <div id="paraList" class="space-y-4"></div>
    </section>
</div>

<!-- ════════════════════════════════════════
     奖励弹窗
════════════════════════════════════════ -->
<div id="screenReward" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="reward-in bg-white rounded-[2.5rem] p-10 text-center max-w-xs w-full">
        <div class="text-7xl mb-4">🥇</div>
        <h2 class="text-3xl font-black text-blue-600 mb-1">太棒了！</h2>
        <p id="rewardName" class="text-gray-500 mb-6 text-lg"></p>
        <div class="bg-yellow-100 text-yellow-700 font-bold py-2 px-5 rounded-full inline-block mb-6 text-sm">
            🏅 获得「识字小状元」勋章
        </div>
        <div class="text-4xl font-black text-orange-500 mb-6">
            总分 <span id="rewardScore">0</span>
        </div>
        <button onclick="goHome()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg transition-all">
            继续学习 <i class="fas fa-arrow-right ml-2"></i>
        </button>
    </div>
</div>

<script>
// ════════════════════════════════════════
//  课程数据（不依赖 API）
// ════════════════════════════════════════
const OPENAI_KEY = ""; // ← 填入你的 OpenAI key（不推送到 GitHub）

const LESSONS = [

        ]
    },
    // ── 第二单元：走进教室 ──────────────────────────────────────
    {

        content: "上课了，来识字，识了字儿会读书。读儿歌，读故事，天天学习长知识。",

    },
    {

        content: "小朋友，学写字，一笔一画要写好，眼到手到心也到，笔画笔顺错不了。",

            { word:"笔画", pinyin:"bǐ huà",  img:"pencil drawing stroke on paper, simple cartoon"                 },
            { word:"笔顺", pinyin:"bǐ shùn", img:"numbered arrows showing stroke order of a Chinese character"    },
            { word:"眼到", pinyin:"yǎn dào", img:"big cute eyes looking carefully at a book, cartoon illustration" }
        ]
    },
    // ── 第三单元：我爱我的家 ────────────────────────────────────
    {
        unit: "第三单元·我爱我的家", title: "一、笑声回来了",

        words: [

            { word:"爸爸", pinyin:"bà ba",       img:"kind cartoon father smiling, simple cute illustration"        },
            { word:"妈妈", pinyin:"mā ma",       img:"gentle cartoon mother smiling, simple cute illustration"      },

        ]
    },
    {
        unit: "第三单元·我爱我的家", title: "二、星星",
        content: "天上星星那么多，这一颗我妈妈，那一颗我爸爸，中间的一颗是我。三颗星星靠得那样近，那样亲，三颗星星那样明。",
        words: [
            { word:"星星", pinyin:"xīng xīng",  img:"twinkling yellow stars in a dark night sky, cute cartoon"  },
            { word:"天上", pinyin:"tiān shàng", img:"beautiful sky above clouds with stars, cartoon illustration" },
            { word:"中间", pinyin:"zhōng jiān", img:"three stars with the middle one glowing brightest, cartoon" },
            { word:"三颗", pinyin:"sān kē",     img:"three glowing stars close together in the sky, cartoon"    }
        ]

];

const GAS_URL = "https://script.google.com/macros/s/AKfycbyL8fpYyrFtFnzTMvnZOuAy68rhhwW_y0-1Agq4PdLEhh0Yjqcd07MSuI32qUMDiNR0/exec";

// 同一 session 内的图片缓存（避免重复生成）
const imgCache = {};

// ════════════════════════════════════════
//  应用状态
// ════════════════════════════════════════
let currentLesson = null;
let currentParas  = [];
let studentName   = '';
let itemScores    = {};   // { id: score } 只记最高分
let totalItems    = 0;

// ════════════════════════════════════════
//  初始化
// ════════════════════════════════════════
window.onload = () => {
    const saved = localStorage.getItem('studentName');
    if (saved) document.getElementById('inputName').value = saved;

    const menu   = document.getElementById('lessonMenu');
    const UNIT_COLORS = ['blue','purple','green'];
    let   lastUnit = '', unitIdx = -1;

    LESSONS.forEach((lesson, idx) => {
        // 单元标题（换单元时显示）
        if (lesson.unit !== lastUnit) {
            lastUnit = lesson.unit;
            unitIdx++;
            const c = UNIT_COLORS[unitIdx % UNIT_COLORS.length];
            const hdr = document.createElement('div');
            hdr.className = `text-xs font-black text-${c}-600 bg-${c}-50 border border-${c}-100 rounded-xl px-3 py-2 mt-3 mb-1`;
            hdr.textContent = lesson.unit;
            menu.appendChild(hdr);
        }
        // 课程按钮
        const btn = document.createElement('div');
        btn.className = 'lesson-card bg-white border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center shadow-sm';
        btn.innerHTML = `
            <div class="font-bold text-gray-800">${lesson.title}</div>
            <i class="fas fa-chevron-right text-blue-300"></i>`;
        btn.onclick = () => startLesson(idx);
        menu.appendChild(btn);
    });
};

// ════════════════════════════════════════
//  开始课程
// ════════════════════════════════════════
function startLesson(idx) {
    studentName = document.getElementById('inputName').value.trim();
    if (!studentName) { alert('请先输入名字！'); return; }
    localStorage.setItem('studentName', studentName);

    currentLesson = LESSONS[idx];
    itemScores    = {};

    // 按句号/感叹号/问号分段
    currentParas = currentLesson.content
        .replace(/([。！？])/g, '$1\n').split('\n')
        .map(s => s.trim()).filter(Boolean);

    totalItems = currentLesson.words.length + currentParas.length;

    // 渲染界面
    document.getElementById('lessonTitle').textContent  = currentLesson.title;
    document.getElementById('studentLabel').textContent = `状元：${studentName}`;
    document.getElementById('totalScore').textContent   = '0';
    updateProgress();

    renderWords(currentLesson.words);
    renderParas(currentParas);

    show('screenLearn');
}

// ════════════════════════════════════════
//  渲染生词卡
// ════════════════════════════════════════
function renderWords(words) {
    const grid = document.getElementById('wordGrid');
    grid.innerHTML = '';
    words.forEach((w, i) => {
        const id = `word-${i}`;
        const card = document.createElement('div');
        card.className = 'rounded-3xl overflow-hidden shadow-md flex flex-col bg-white';
        card.innerHTML = `
            <!-- 图片区：先显示渐变 + 汉字，生成后替换为 AI 图 -->
            <div id="img-${id}" class="grad-${i%6} h-36 flex items-center justify-center relative overflow-hidden">
                <span class="hanzi text-6xl text-white drop-shadow">${w.word}</span>
                <div id="img-loader-${id}" class="absolute inset-0 flex items-center justify-center bg-black/20 hidden">
                    <div class="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>
            <!-- 信息区 -->
            <div class="flex-1 p-4 text-center">
                <div class="text-red-500 font-bold text-sm mb-1">${w.pinyin}</div>
                <div class="hanzi text-3xl text-gray-800 mb-2">${w.word}</div>
                <div id="match-${id}" class="text-xs min-h-[1.2rem] text-gray-400 mb-1"></div>
                <div id="score-${id}" class="text-xs font-bold min-h-[1.2rem] mb-3"></div>
                <div class="flex justify-center gap-3">
                    <button onclick="speak('${w.word}')"
                        class="w-11 h-11 rounded-full bg-blue-50 text-blue-500 hover:bg-blue-100 transition-all flex items-center justify-center">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button id="btn-${id}" onclick="startRead('${w.word}','${id}')"
                        class="w-11 h-11 rounded-full bg-red-50 text-red-500 hover:bg-red-100 transition-all flex items-center justify-center">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>
            </div>`;
        grid.appendChild(card);
    });

    // 异步生成图片（不阻塞页面渲染）
    if (OPENAI_KEY) generateImages(words);
}

// ════════════════════════════════════════
//  DALL-E 3 图片生成
// ════════════════════════════════════════
async function generateImages(words) {
    words.forEach((w, i) => {
        const id = `word-${i}`;
        generateOneImage(w, id);
    });
}

async function generateOneImage(w, id) {
    // 命中缓存直接用
    if (imgCache[w.word]) {
        setImg(id, imgCache[w.word]);
        return;
    }

    const loader = document.getElementById(`img-loader-${id}`);
    if (loader) loader.classList.remove('hidden');

    try {
        const res = await fetch('https://api.openai.com/v1/images/generations', {
            method: 'POST',
            headers: {
                'Content-Type':  'application/json',
                'Authorization': `Bearer ${OPENAI_KEY}`
            },
            body: JSON.stringify({
                model:           'dall-e-3',
                prompt:          `Cute simple cartoon illustration for Chinese primary school children, colorful, white background, child-friendly. Subject: ${w.img}`,
                n:               1,
                size:            '1024x1024',
                response_format: 'b64_json'
            })
        });
        const data = await res.json();
        const b64  = data.data?.[0]?.b64_json;
        if (b64) {
            const src = `data:image/png;base64,${b64}`;
            imgCache[w.word] = src;
            setImg(id, src);
        }
    } catch(e) { /* 保留渐变占位 */ }

    if (loader) loader.classList.add('hidden');
}

function setImg(id, src) {
    const el = document.getElementById(`img-${id}`);
    if (!el) return;
    el.innerHTML = `<img src="${src}" class="w-full h-full object-cover" alt="">`;
}

// ════════════════════════════════════════
//  渲染段落
// ════════════════════════════════════════
function renderParas(paras) {
    const list = document.getElementById('paraList');
    list.innerHTML = '';
    paras.forEach((p, i) => {
        const id   = `para-${i}`;
        const safe = p.replace(/'/g, "\\'");
        const row  = document.createElement('div');
        row.className = 'bg-white rounded-2xl shadow-sm p-5 border-l-4 border-blue-400';
        row.innerHTML = `
            <p class="text-xl text-gray-700 leading-relaxed mb-3">${p}</p>
            <!-- 实时字符匹配 -->
            <div id="match-${id}" class="text-sm font-bold mb-2 min-h-[1.5rem] tracking-wider"></div>
            <!-- 识别文字 -->
            <div id="heard-${id}" class="text-xs text-gray-400 mb-3 min-h-[1rem]"></div>
            <!-- 得分 -->
            <div id="score-${id}" class="text-sm font-bold min-h-[1.5rem] mb-3"></div>
            <!-- 按钮 -->
            <div class="flex gap-3">
                <button onclick="speak('${safe}')"
                    class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2.5 rounded-full font-bold text-sm transition-all flex items-center gap-2">
                    <i class="fas fa-volume-up"></i> 听读
                </button>
                <button id="btn-${id}" onclick="startRead('${safe}','${id}')"
                    class="bg-red-500 hover:bg-red-600 text-white px-5 py-2.5 rounded-full font-bold text-sm transition-all flex items-center gap-2">
                    <i class="fas fa-microphone"></i> 朗读
                </button>
            </div>`;
        list.appendChild(row);
    });
}

// ════════════════════════════════════════
//  TTS — Web Speech API
// ════════════════════════════════════════
function speak(text) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang  = 'zh-CN';
    u.rate  = 0.85;
    u.pitch = 1;
    speechSynthesis.speak(u);
}

// ════════════════════════════════════════
//  朗读 + 实时评分 — SpeechRecognition
// ════════════════════════════════════════
function startRead(target, id) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('请使用 Chrome 或 Edge 浏览器'); return; }

    const btn     = document.getElementById(`btn-${id}`);
    const matchEl = document.getElementById(`match-${id}`);
    const heardEl = document.getElementById(`heard-${id}`);
    const scoreEl = document.getElementById(`score-${id}`);

    const recog          = new SR();
    recog.lang           = 'zh-CN';
    recog.continuous     = false;
    recog.interimResults = true;   // ← 实时返回
    recog.maxAlternatives = 1;

    let lastSpoken = '';

    // ── 录音中 UI ────────────────────────
    const origHtml = btn.innerHTML;
    btn.innerHTML  = '<i class="fas fa-circle-notch fa-spin"></i>';
    btn.classList.add('rec-pulse', '!bg-red-600');
    if (matchEl) matchEl.innerHTML = '🎤 请朗读…';
    if (heardEl) heardEl.textContent = '';
    if (scoreEl) scoreEl.textContent = '';

    // ── 实时结果 ─────────────────────────
    recog.onresult = (e) => {
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            (e.results[i].isFinal ? (final += e.results[i][0].transcript)
                                  : (interim += e.results[i][0].transcript));
        }
        lastSpoken = final || interim;

        // 实时字符匹配高亮
        if (matchEl) matchEl.innerHTML = renderMatchChars(target, lastSpoken);
        if (heardEl) heardEl.textContent = lastSpoken ? `识别：「${lastSpoken}」` : '';
    };

    // ── 识别结束 → 计算最终得分 ──────────
    recog.onend = () => {
        btn.innerHTML = origHtml;
        btn.classList.remove('rec-pulse', '!bg-red-600');

        if (!lastSpoken) {
            if (matchEl) matchEl.innerHTML = '<span class="text-gray-400 text-xs">未能识别，请再试一次</span>';
            return;
        }

        const score = calcScore(target, lastSpoken);
        showScore(id, target, lastSpoken, score);
        updateTotal(id, score);
        checkDone();
        uploadGAS(target, lastSpoken, score);
    };

    recog.onerror = (e) => {
        btn.innerHTML = origHtml;
        btn.classList.remove('rec-pulse', '!bg-red-600');
        if (e.error !== 'no-speech') {
            if (matchEl) matchEl.innerHTML = '<span class="text-red-400 text-xs">识别出错，请重试</span>';
        }
    };

    recog.start();
}

// ── 字符匹配高亮 ──────────────────────────────────────────────
function renderMatchChars(target, spoken) {
    const spoken_set = new Set([...spoken.replace(/[^一-鿿]/g, '')]);
    return [...target].map(c => {
        if (!/[一-鿿]/.test(c)) return `<span class="char-punc">${c}</span>`;
        return spoken_set.has(c)
            ? `<span class="char-hit">${c}</span>`
            : `<span class="char-miss">${c}</span>`;
    }).join('');
}

// ── 显示最终得分 ──────────────────────────────────────────────
function showScore(id, target, spoken, score) {
    const matchEl = document.getElementById(`match-${id}`);
    const scoreEl = document.getElementById(`score-${id}`);
    if (matchEl) matchEl.innerHTML = renderMatchChars(target, spoken);
    if (!scoreEl) return;

    const stars = score >= 90 ? 5 : score >= 75 ? 4 : score >= 55 ? 3 : score >= 30 ? 2 : 1;
    const color = score >= 75 ? 'text-green-600' : score >= 50 ? 'text-yellow-600' : 'text-red-500';
    const msgs  = { 5:'完美！字字清晰！🌟', 4:'读得很好！👍', 3:'不错！多练几次！😊', 2:'继续加油！💪', 1:'再来一次！🌈' };
    scoreEl.innerHTML = `<span class="${color}">${'⭐'.repeat(stars)}${'☆'.repeat(5-stars)} ${score}分</span> <span class="text-gray-400 text-xs">${msgs[stars]}</span>`;
}

// ── 得分计算 ──────────────────────────────────────────────────
function calcScore(target, spoken) {
    const tChars = [...target.replace(/[^一-鿿]/g, '')];
    const sSet   = new Set([...spoken.replace(/[^一-鿿]/g, '')]);
    if (!tChars.length) return 0;
    const hits = tChars.filter(c => sSet.has(c)).length;
    return Math.round(hits / tChars.length * 100);
}

// ── 更新总分（只计最高）────────────────────────────────────────
function updateTotal(id, score) {
    const prev = itemScores[id] ?? -1;
    if (score > prev) {
        itemScores[id] = score;
        const total = Object.values(itemScores).reduce((a, b) => a + b, 0);
        document.getElementById('totalScore').textContent = total;
        updateProgress();
    }
}

// ── 进度条 ────────────────────────────────────────────────────
function updateProgress() {
    const done = Object.keys(itemScores).length;
    const pct  = totalItems ? Math.round(done / totalItems * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
}

// ── 完成检查 → 奖励弹窗 ──────────────────────────────────────
function checkDone() {
    if (Object.keys(itemScores).length < totalItems) return;
    const total = Object.values(itemScores).reduce((a, b) => a + b, 0);
    document.getElementById('rewardName').textContent = `${studentName} 成功完成挑战！`;
    document.getElementById('rewardScore').textContent = total;
    setTimeout(() => {
        show('screenReward');
        spawnConfetti();
    }, 800);
}

// ── 彩屑 ─────────────────────────────────────────────────────
function spawnConfetti() {
    const colors = ['#f2d74e','#95c3de','#ff9a91','#96db8d','#c890e4'];
    for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-20px;background:${colors[i%colors.length]};animation-delay:${Math.random()*1.5}s;animation-duration:${2+Math.random()*1.5}s`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}

// ── GAS 上传 ──────────────────────────────────────────────────
function uploadGAS(target, spoken, score) {
    fetch(GAS_URL, {
        method: 'POST',
        mode:   'no-cors',
        body:   JSON.stringify({
            name:    studentName,
            lesson:  currentLesson?.title,
            content: target,
            spoken,
            score,
            time:    new Date().toLocaleString('zh-CN')
        })
    }).catch(() => {}); // 静默失败
}

// ── 屏幕切换 ─────────────────────────────────────────────────
function show(id) {
    ['screenStart','screenLearn','screenReward'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
    });
}

function goHome() {
    speechSynthesis.cancel();
    show('screenStart');
    currentLesson = null;
    itemScores    = {};
}
</script>
