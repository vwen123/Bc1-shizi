<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小状元识字 - 快乐学习每一天</title>
    <!-- 预连接：提前建立连接，减少延迟 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://vwen123.github.io">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HanziWriter 延迟加载（只在笔顺弹窗用） -->
    <script defer src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- font-display:swap：字体未载入时先用系统字体，不阻塞渲染 -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700;900&display=swap&font-display=swap" rel="stylesheet">
    <style>
        :root { --primary:#3b82f6; --secondary:#f43f5e; --accent:#f59e0b; }
        body { font-family:'Noto Sans SC',sans-serif; background:#f8fafc; min-height:100vh; color:#1e293b; }
        .hanzi-font { font-family:'Ma Shan Zheng',cursive; }

        .lesson-card { transition:all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .lesson-card:hover { transform:translateY(-5px); box-shadow:0 12px 24px -10px rgba(59,130,246,0.3); }

        .rec-active { animation:recPulse 1.5s infinite; background-color:#ef4444 !important; color:#fff !important; }
        @keyframes recPulse {
            0%   { box-shadow:0 0 0 0 rgba(239,68,68,0.4); }
            70%  { box-shadow:0 0 0 15px rgba(239,68,68,0); }
            100% { box-shadow:0 0 0 0 rgba(239,68,68,0); }
        }

        .char-hit  { color:#10b981; font-weight:800; border-bottom:2px solid #10b981; }
        .char-miss { color:#cbd5e1; }
        .char-punc { color:#94a3b8; }

        .reward-bounce { animation:bounceIn 0.8s cubic-bezier(0.36,0,0.66,-0.56) both; }
        @keyframes bounceIn {
            0%   { opacity:0; transform:scale(0.3); }
            50%  { opacity:1; transform:scale(1.05); }
            70%  { transform:scale(0.9); }
            100% { transform:scale(1); }
        }

        #progressBar { transition:width 0.6s cubic-bezier(0.65,0,0.35,1); }
        .confetti { position:fixed; width:10px; height:10px; z-index:100; pointer-events:none; animation:fall 3s linear forwards; }
        @keyframes fall { 0%{transform:translateY(-10vh) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

        .actions-hidden  { opacity:0; pointer-events:none; transform:translateY(8px); transition:all 0.4s ease; }
        .actions-visible { opacity:1; pointer-events:auto; transform:translateY(0); }

        .skeleton { background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size:200% 100%; animation:loading 1.5s infinite; }
        @keyframes loading { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
</head>
<body>

<!-- ════════════ 界面一：登录与选课 ════════════ -->
<div id="screenStart" class="max-w-md mx-auto px-6 py-12">
    <div class="bg-white rounded-[2.5rem] shadow-2xl border-b-8 border-blue-600 p-8 text-center">
        <div class="inline-block p-4 bg-blue-50 rounded-full mb-6">
            <span class="text-6xl">🎓</span>
        </div>
        <h1 class="text-4xl font-black text-blue-600 mb-2 tracking-tight">小状元识字</h1>
        <p class="text-slate-400 mb-8 font-medium">像状元一样快乐读书</p>

        <div class="text-left mb-4">
            <label class="text-sm font-bold text-slate-500 mb-2 block ml-2">班级代码</label>
            <input id="inputClass" type="text" placeholder="例：YANI1A"
                   class="w-full px-6 py-4 border-2 border-slate-100 rounded-2xl text-center text-xl focus:outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-50 transition-all bg-slate-50/50 uppercase">
        </div>
        <div class="text-left mb-6">
            <label class="text-sm font-bold text-slate-500 mb-2 block ml-2">输入你的代号</label>
            <input id="inputName" type="text" placeholder="输入你的代号..."
                   class="w-full px-6 py-4 border-2 border-slate-100 rounded-2xl text-center text-xl focus:outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-50 transition-all bg-slate-50/50">
        </div>

        <div class="text-left">
            <label class="text-sm font-bold text-slate-500 mb-3 block ml-2">选择今日课题</label>
            <div id="lessonMenu" class="space-y-3 max-h-[40vh] overflow-y-auto pr-1">
                <div class="text-center text-slate-300 py-8">
                    <div class="w-8 h-8 border-3 border-blue-300 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
                    加载课程中...
                </div>
            </div>
        </div>

        <div class="mt-5 pt-4 border-t border-slate-100 space-y-2">
            <button onclick="openLeaderboard()"
                class="w-full py-3 rounded-2xl bg-amber-50 text-amber-600 font-bold hover:bg-amber-100 transition-all flex items-center justify-center gap-2 text-sm">
                🏆 查看班级排行榜
            </button>
            <button onclick="openTeacherMode()"
                class="w-full py-2.5 rounded-2xl text-slate-400 hover:bg-slate-50 font-bold transition-all flex items-center justify-center gap-2 text-xs">
                <i class="fas fa-chalkboard-teacher"></i> 教师入口
            </button>
        </div>
    </div>
</div>

<!-- ════════════ 界面二：学习主界面 ════════════ -->
<div id="screenLearn" class="hidden max-w-5xl mx-auto px-4 py-8">

    <!-- 顶部导航 -->
    <div class="sticky top-4 z-40 bg-white/80 backdrop-blur-md rounded-3xl shadow-lg p-4 mb-8 flex items-center justify-between border border-white">
        <button onclick="goHome()" class="flex items-center gap-2 px-4 py-2 text-slate-600 font-bold hover:bg-slate-100 rounded-2xl transition-all">
            <i class="fas fa-home"></i> 首页
        </button>
        <div class="text-center">
            <h2 id="lessonTitle" class="text-xl font-black text-slate-800 leading-tight"></h2>
            <div id="studentLabel" class="text-[10px] uppercase tracking-widest text-blue-500 font-bold"></div>
        </div>
        <div class="bg-amber-50 px-4 py-1 rounded-2xl border border-amber-100 text-center min-w-[80px]">
            <div class="text-[10px] text-amber-600 font-black uppercase">积分</div>
            <div id="totalScore" class="text-xl font-black text-amber-500">0</div>
        </div>
    </div>

    <!-- 进度条 -->
    <div class="mb-10 px-2">
        <div class="flex justify-between text-xs font-bold text-slate-400 mb-2 px-1">
            <span>学习进度</span>
            <span id="progressText">0%</span>
        </div>
        <div class="bg-slate-200 rounded-full h-3 overflow-hidden shadow-inner">
            <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-cyan-400 h-full rounded-full" style="width:0%"></div>
        </div>
    </div>

    <!-- 第一关：认读生词 -->
    <section class="mb-12">
        <div class="flex items-center gap-3 mb-6">
            <span class="w-10 h-10 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-black shadow-lg shadow-blue-200">1</span>
            <h3 class="text-2xl font-black text-slate-800">认读并临摹</h3>
        </div>
        <div id="wordGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </section>

    <!-- 第二关：朗读 -->
    <section class="pb-20">
        <div class="flex items-center gap-3 mb-6">
            <span class="w-10 h-10 bg-rose-500 text-white rounded-2xl flex items-center justify-center font-black shadow-lg shadow-rose-200">2</span>
            <h3 class="text-2xl font-black text-slate-800">金声朗读</h3>
        </div>
        <div id="paraList" class="space-y-6"></div>
    </section>
</div>

<!-- ════════════ 笔顺弹窗 ════════════ -->
<div id="quizModal" class="hidden fixed inset-0 z-[100] bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-[3rem] w-full max-w-lg shadow-2xl p-8 relative">
        <button onclick="closeQuiz()" class="absolute top-8 right-8 w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 hover:text-slate-600">
            <i class="fas fa-times text-xl"></i>
        </button>
        <div class="text-center mb-8">
            <h4 class="text-2xl font-black text-slate-800 mb-1">笔顺大挑战</h4>
            <div id="quiz-status" class="text-blue-500 font-bold animate-pulse">正在演示笔顺...</div>
        </div>
        <div class="flex flex-col items-center">
            <div id="quiz-writer-container" class="bg-white border-8 border-blue-50 rounded-[2.5rem] shadow-inner p-6 mb-8 cursor-crosshair"></div>
        </div>
        <div class="flex gap-4">
            <button onclick="resetQuiz()" class="flex-1 py-5 rounded-2xl bg-slate-100 text-slate-600 font-black hover:bg-slate-200">重写</button>
            <button onclick="closeQuiz()" class="flex-1 py-5 rounded-2xl bg-blue-600 text-white font-black hover:bg-blue-700 shadow-xl shadow-blue-200">我写好了</button>
        </div>
    </div>
</div>

<!-- ════════════ 完成奖励 ════════════ -->
<div id="screenReward" class="hidden fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-6">
    <div class="reward-bounce bg-white rounded-[3rem] p-10 text-center max-w-sm w-full shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-400"></div>
        <div class="text-8xl mb-6">🏆</div>
        <h2 class="text-3xl font-black text-slate-800 mb-2">功成名就！</h2>
        <p id="rewardName" class="text-slate-500 mb-8"></p>
        <div class="bg-blue-50 rounded-3xl p-6 mb-8">
            <div class="text-sm font-bold text-blue-600 uppercase mb-1">状元总得分</div>
            <div id="rewardScore" class="text-5xl font-black text-blue-600">0</div>
        </div>
        <button onclick="openLeaderboard()"
            class="w-full bg-amber-500 hover:bg-amber-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl mb-3">
            🏆 查看班级排行榜
        </button>
        <button onclick="goHome()" class="w-full bg-slate-800 hover:bg-black text-white py-5 rounded-2xl font-black text-lg shadow-xl">
            返回首页
        </button>
    </div>
</div>

<!-- ════════════ 界面四：教师专区 ════════════ -->
<div id="screenTeacher" class="hidden max-w-md mx-auto px-6 py-12">
    <div class="bg-white rounded-[2.5rem] shadow-2xl border-b-8 border-purple-600 p-8">

        <!-- 顶部 -->
        <div class="flex items-center justify-between mb-6">
            <button onclick="goHome()" class="w-9 h-9 rounded-2xl bg-slate-100 text-slate-500 flex items-center justify-center hover:bg-slate-200 transition-all">
                <i class="fas fa-arrow-left text-sm"></i>
            </button>
            <div class="text-center">
                <div class="text-2xl font-black text-purple-600">教师专区</div>
                <div id="teacherClassLabel" class="text-xs text-slate-400 font-bold"></div>
            </div>
            <button id="teacherLogoutBtn" onclick="teacherLogout()" class="hidden text-xs text-slate-400 hover:text-slate-600 font-bold px-3 py-2 rounded-xl hover:bg-slate-100 transition-all">
                退出
            </button>
            <div id="teacherLogoutPlaceholder" class="w-9"></div>
        </div>

        <!-- ── 登录 / 注册面板 ── -->
        <div id="teacherAuthPanel">
            <!-- 标签 -->
            <div class="flex bg-slate-100 rounded-2xl p-1 mb-6">
                <button id="tabCreate" onclick="switchTeacherTab('create')"
                    class="flex-1 py-2.5 rounded-xl text-sm font-black transition-all bg-white text-purple-600 shadow-sm">
                    创建班级
                </button>
                <button id="tabLogin" onclick="switchTeacherTab('login')"
                    class="flex-1 py-2.5 rounded-xl text-sm font-black transition-all text-slate-400">
                    进入班级
                </button>
            </div>

            <!-- 创建班级 -->
            <div id="teacherCreateForm" class="space-y-3">
                <input id="tcClassCode" type="text" placeholder="设定班级代码（如 SMKB1A）" maxlength="12"
                    class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl text-center text-lg uppercase focus:outline-none focus:border-purple-400 focus:ring-4 focus:ring-purple-50 transition-all bg-slate-50/50 font-bold tracking-wider">
                <input id="tcPin" type="password" placeholder="设定教师密码（4-8位）" maxlength="8"
                    class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl text-center text-lg focus:outline-none focus:border-purple-400 focus:ring-4 focus:ring-purple-50 transition-all bg-slate-50/50 tracking-widest">
                <input id="tcPinConfirm" type="password" placeholder="再输一次确认" maxlength="8"
                    class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl text-center text-lg focus:outline-none focus:border-purple-400 focus:ring-4 focus:ring-purple-50 transition-all bg-slate-50/50 tracking-widest">
                <button onclick="createClass()"
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white py-4 rounded-2xl font-black text-lg transition-all shadow-lg shadow-purple-100">
                    创建班级
                </button>
                <p class="text-xs text-slate-300 text-center">创建后把班级代码告知学生即可</p>
            </div>

            <!-- 进入班级 -->
            <div id="teacherLoginForm" class="space-y-3 hidden">
                <input id="tlClassCode" type="text" placeholder="班级代码" maxlength="12"
                    class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl text-center text-lg uppercase focus:outline-none focus:border-purple-400 focus:ring-4 focus:ring-purple-50 transition-all bg-slate-50/50 font-bold tracking-wider">
                <input id="tlPin" type="password" placeholder="教师密码" maxlength="8"
                    class="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl text-center text-lg focus:outline-none focus:border-purple-400 focus:ring-4 focus:ring-purple-50 transition-all bg-slate-50/50 tracking-widest">
                <button onclick="teacherLogin()"
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white py-4 rounded-2xl font-black text-lg transition-all shadow-lg shadow-purple-100">
                    进入
                </button>
            </div>
        </div>

        <!-- ── 班级数据面板（登录后） ── -->
        <div id="teacherDataPanel" class="hidden">
            <div class="flex items-center gap-3 mb-5">
                <label class="text-sm font-bold text-slate-500 shrink-0">课题：</label>
                <select id="teacherLessonSelect" onchange="loadTeacherAnalytics()"
                    class="flex-1 p-3 border-2 border-slate-100 rounded-xl text-sm focus:outline-none focus:border-purple-400 font-bold">
                    <option value="">— 请选择 —</option>
                </select>
            </div>

            <div id="teacherAnalyticsContent">
                <div class="text-center text-slate-300 py-10 text-sm">请选择课题查看数据</div>
            </div>
        </div>

    </div>
</div>

<!-- ════════════ 界面五：排行榜 ════════════ -->
<div id="screenLeaderboard" class="hidden max-w-2xl mx-auto px-4 py-8">

    <!-- 顶部导航 -->
    <div class="sticky top-4 z-40 bg-white/80 backdrop-blur-md rounded-3xl shadow-lg p-4 mb-8 flex items-center justify-between border border-white">
        <button onclick="goHome()" class="flex items-center gap-2 px-4 py-2 text-slate-600 font-bold hover:bg-slate-100 rounded-2xl transition-all">
            <i class="fas fa-home"></i> 首页
        </button>
        <div class="text-center">
            <h2 class="text-xl font-black text-slate-800">🏆 班级排行榜</h2>
            <div id="lbClassBadge" class="text-[10px] uppercase tracking-widest text-amber-500 font-bold"></div>
        </div>
        <button onclick="reloadLeaderboard()" class="flex items-center gap-2 px-4 py-2 text-slate-600 font-bold hover:bg-slate-100 rounded-2xl transition-all">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>

    <!-- 班级代码输入（未登录时） -->
    <div id="lbInputSection" class="hidden mb-6">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
            <label class="text-sm font-bold text-slate-500 mb-2 block">输入班级代码查看排行</label>
            <div class="flex gap-3">
                <input id="lbClassInput" type="text" placeholder="例：YANI1A"
                    class="flex-1 px-4 py-3 border-2 border-slate-100 rounded-xl text-center uppercase focus:outline-none focus:border-amber-400 text-lg">
                <button onclick="loadLeaderboard(document.getElementById('lbClassInput').value.trim().toUpperCase())"
                    class="px-5 py-3 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600 transition-all">
                    查看
                </button>
            </div>
        </div>
    </div>

    <!-- 课题筛选 -->
    <div id="lbFilterSection" class="hidden bg-white rounded-2xl shadow-sm p-4 mb-6 flex items-center gap-3">
        <label class="text-sm font-bold text-slate-500 shrink-0"><i class="fas fa-filter mr-1"></i>课题：</label>
        <select id="lbLessonFilter" onchange="renderLeaderboard()"
            class="flex-1 p-2.5 border-2 border-slate-100 rounded-xl text-sm focus:outline-none focus:border-amber-400 font-bold">
            <option value="">全部课题</option>
        </select>
    </div>

    <!-- 加载中 -->
    <div id="lbLoading" class="hidden text-center py-16 text-slate-400">
        <div class="w-8 h-8 border-4 border-amber-300 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
        加载排行榜...
    </div>

    <!-- 排行内容 -->
    <div id="lbContent" class="hidden">
        <div id="lbPodium" class="flex items-end justify-center gap-3 mb-8 px-2 min-h-[200px]"></div>
        <div id="lbList" class="space-y-3 mb-6"></div>
        <div id="lbEmpty" class="hidden text-center py-16">
            <div class="text-5xl mb-3">📝</div>
            <div class="font-black text-slate-400">还没有同学练习</div>
        </div>
        <div id="lbStats" class="bg-white rounded-2xl p-4 text-center text-xs text-slate-400 font-bold"></div>
    </div>
</div>

<script>
// ════════════════════════════════════════
//  Firebase 初始化
// ════════════════════════════════════════
firebase.initializeApp({
    apiKey:            "AIzaSyCVnBotyPuwS9xfUl7YCN2jS7gXUHIQyHc",
    authDomain:        "huawen-class.firebaseapp.com",
    projectId:         "huawen-class",
    storageBucket:     "huawen-class.firebasestorage.app",
    messagingSenderId: "606012248377",
    appId:             "1:606012248377:web:7f55bb58ed2abd1c4458e8"
});
const db = firebase.firestore();

// ════════════════════════════════════════
//  应用状态
// ════════════════════════════════════════
let allLessons    = [];
let currentLesson = null;
let currentParas  = [];
let studentName   = '';
let classCode     = '';
let itemScores    = {};
let totalItems    = 0;
let currentAttemptId = null;
let activeQuizWriter = null;
let activeQuizId     = null;
let _rec             = null;
let _recId           = null;

// ════════════════════════════════════════
//  初始化 — 从 Firestore 加载课程
// ════════════════════════════════════════
window.onload = async () => {
    const savedName  = localStorage.getItem('shizi_studentName');
    const savedClass = localStorage.getItem('shizi_classCode');
    if (savedName)  document.getElementById('inputName').value  = savedName;
    if (savedClass) document.getElementById('inputClass').value = savedClass;

    try {
        const snap = await db.collection('lessons').get();
        allLessons = snap.docs
            .map(d => ({ lessonId: d.id, ...d.data() }))
            .filter(l => l.status === 'published')
            .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
        renderLessonMenu();
    } catch(e) {
        document.getElementById('lessonMenu').innerHTML =
            '<div class="text-red-400 text-sm text-center py-6">课程加载失败，请检查网络</div>';
    }
};

function renderLessonMenu() {
    const menu = document.getElementById('lessonMenu');
    if (!allLessons.length) {
        menu.innerHTML = '<div class="text-slate-300 text-sm text-center py-8">老师还未发布课程</div>';
        return;
    }
    menu.innerHTML = '';
    let lastUnit = '';
    allLessons.forEach((l, i) => {
        if (l.unit !== lastUnit) {
            lastUnit = l.unit;
            const h = document.createElement('div');
            h.className = 'text-[10px] font-black text-slate-400 uppercase tracking-widest mt-5 mb-1 ml-1';
            h.textContent = l.unit;
            menu.appendChild(h);
        }
        const card = document.createElement('div');
        card.className = 'lesson-card bg-white border border-slate-100 rounded-2xl p-5 flex justify-between items-center cursor-pointer shadow-sm';
        card.innerHTML = `
            <div class="font-bold text-slate-700">${l.title}</div>
            <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center">
                <i class="fas fa-play text-[10px]"></i>
            </div>`;
        card.onclick = () => startLesson(i);
        menu.appendChild(card);
    });
}

// ════════════════════════════════════════
//  开始课程
// ════════════════════════════════════════
function startLesson(idx) {
    classCode   = document.getElementById('inputClass').value.trim().toUpperCase();
    studentName = document.getElementById('inputName').value.trim();

    localStorage.setItem('shizi_studentName', studentName);

    currentLesson    = allLessons[idx];
    itemScores       = {};
    currentAttemptId = null;

    // 按句号/感叹号/问号分段
    currentParas = currentLesson.content
        .split(/(?<=[。！？])/)

// ════════════════════════════════════════
//  TTS — Web Speech API
// ════════════════════════════════════════
function speak(text) {
    window.speechSynthesis.cancel();
    const u  = new SpeechSynthesisUtterance(text);
    u.lang   = 'zh-CN';
    u.rate   = 0.85;
    window.speechSynthesis.speak(u);
}

// ════════════════════════════════════════
//  朗读识别 + 实时评分（改进版）
// ════════════════════════════════════════
function startRecognition(target, id) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showMsg('请使用 Chrome 或 Edge 浏览器'); return; }

    const btn     = document.getElementById(`btn-${id}`);
    const display = document.getElementById(`display-${id}`);
    const scoreEl = document.getElementById(`score-${id}`);
    if (!btn) return;

    // ── 点同一按钮 = 停止当前录音 ────────────────────────────
    if (_recId === id && _rec) {
        _rec.stop();
        return;
    }
    // 停止其他正在进行的录音
    if (_rec) { try { _rec.stop(); } catch(e) {} _rec = null; _recId = null; }

    const recognition         = new SR();
    recognition.lang          = 'zh-CN';
    recognition.continuous    = true;    // 持续聆听，不会中途断掉
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    _rec   = recognition;
    _recId = id;

    // ── 判断按钮形状（词语卡是正方形，段落是长方形）────────────
    const isSquare = btn.classList.contains('aspect-square');

    // 保存原始样式
    const origBg   = isSquare ? 'bg-rose-50 text-rose-500 hover:bg-rose-100'
                              : 'bg-rose-500 text-white hover:bg-rose-600 shadow-lg shadow-rose-100';
    const recBg    = 'bg-red-500 text-white';

    btn.className  = btn.className.replace(origBg, recBg) + ' rec-active';
    btn.innerHTML  = isSquare
        ? '<i class="fas fa-stop"></i>'
        : '<i class="fas fa-stop mr-2"></i>停止';

    if (display) display.innerHTML =
        '<span class="text-slate-400 text-sm animate-pulse">🎤 请开始朗读...</span>';

    let accumulated  = '';
    let silenceTimer = null;

    // ── 完成录音 → 计分 ──────────────────────────────────────
    const finish = (spoken) => {
        if (_rec !== recognition) return;
        _rec = null; _recId = null;
        clearTimeout(silenceTimer);

        // 还原按钮
        btn.classList.remove('rec-active');
        btn.className = btn.className.replace(recBg, origBg).replace(' rec-active','');
        btn.innerHTML = isSquare
            ? '<i class="fas fa-microphone"></i>'
            : '<i class="fas fa-microphone mr-2"></i>朗读';

        const text = spoken.trim();
        if (!text) {
            if (display) display.innerHTML =
                '<span class="text-slate-300 text-sm">没有识别到声音，请靠近麦克风再试 🎤</span>';
            return;
        }

        const score = calcScore(target, text);
        const stars = score >= 90 ? 5 : score >= 75 ? 4 : score >= 55 ? 3 : score >= 30 ? 2 : 1;
        const msgs  = ['再来一次！🌈','继续练习！💪','不错，加油！😊','读得很好！👍','完美！🌟'];

        if (display) display.innerHTML = highlightMatch(target, text);
        if (scoreEl) scoreEl.innerHTML = `
            <div class="flex items-center flex-wrap gap-1.5 mt-1">
                <span class="text-amber-400 text-lg leading-none">${'⭐'.repeat(stars)}<span class="opacity-20">${'☆'.repeat(5-stars)}</span></span>
                <span class="font-black text-slate-700">${score}分</span>
                <span class="text-slate-400 text-xs">${msgs[stars-1]}</span>
            </div>
            <div class="text-slate-300 text-xs mt-0.5 truncate">识别：${text}</div>`;

        updateItemScore(id, score);
        saveAttemptToGAS();
        checkAllDone();
    };

    // ── 事件处理 ──────────────────────────────────────────────
    recognition.onspeechstart = () => {
        if (display && !accumulated)
            display.innerHTML = '<span class="text-blue-400 text-sm"><i class="fas fa-circle text-red-500 animate-pulse text-xs mr-1"></i>检测到声音，继续读...</span>';
    };

    recognition.onresult = (e) => {
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) final   += e.results[i][0].transcript;
            else                      interim += e.results[i][0].transcript;
        }
        if (final) accumulated += final;

        // 实时高亮
        const current = accumulated + interim;
        if (display && current)
            display.innerHTML = highlightMatch(target, current);

        // 停顿 1.8 秒后自动结束
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => { try { recognition.stop(); } catch(e){} }, 1800);
    };

    recognition.onerror = (e) => {
        _rec = null; _recId = null;
        clearTimeout(silenceTimer);
        btn.classList.remove('rec-active');
        btn.className = btn.className.replace(recBg, origBg).replace(' rec-active','');
        btn.innerHTML = isSquare
            ? '<i class="fas fa-microphone"></i>'
            : '<i class="fas fa-microphone mr-2"></i>朗读';

        const errMsgs = {
            'not-allowed':   '请在浏览器设置中允许使用麦克风 🎤',
            'no-speech':     '没有检测到声音，请再试一次',
            'network':       '网络问题，请检查连接',
            'audio-capture': '无法访问麦克风',
            'aborted':       ''
        };
        const msg = errMsgs[e.error] ?? '识别出错，请重试';
        if (msg && display) display.innerHTML = `<span class="text-red-400 text-sm">${msg}</span>`;
    };

    recognition.onend = () => { finish(accumulated); };

    try { recognition.start(); }
    catch(e) { _rec = null; _recId = null; showMsg('无法启动录音：' + e.message); }
}

// ── 字符高亮（按顺序匹配，颜色更准确）────────────────────────
function highlightMatch(target, spoken) {
    if (!spoken) return '';
    const cleanS = spoken.replace(/\s/g, '');
    // 顺序扫描：目标文字在识别结果中是否按顺序出现
    const sChars = [...cleanS];
    let si = 0;
    return [...target].map(c => {
        if (/[，。！？、\s]/.test(c)) return `<span class="char-punc">${c}</span>`;
        while (si < sChars.length && sChars[si] !== c) si++;
        if (si < sChars.length) { si++; return `<span class="char-hit">${c}</span>`; }
        return `<span class="char-miss">${c}</span>`;
    }).join('');
}

// ── 评分（顺序匹配 60% + 字符匹配 40%）──────────────────────
function calcScore(target, spoken) {
    const clean = s => [...s].filter(c => /[一-鿿]/.test(c));
    const t = clean(target);
    const s = clean(spoken);
    if (!t.length) return 0;
    if (!s.length) return 0;

    // 顺序匹配（按顺序找到多少目标字）
    let si = 0, seqHits = 0;
    for (const tc of t) {
        while (si < s.length && s[si] !== tc) si++;
        if (si < s.length) { seqHits++; si++; }
    }

    // 字符匹配（不管顺序）
    let setHits = 0;
    const sTemp = [...s];
    for (const tc of t) {
        const idx = sTemp.indexOf(tc);
        if (idx !== -1) { setHits++; sTemp.splice(idx, 1); }
    }

    const score = (seqHits / t.length * 0.6 + setHits / t.length * 0.4) * 100;
    return Math.round(Math.min(100, score));
}

// ════════════════════════════════════════
//  笔顺练习
// ════════════════════════════════════════
function startQuiz(id, char) {
    activeQuizId = id;
    const modal     = document.getElementById('quizModal');
    const container = document.getElementById('quiz-writer-container');
    const status    = document.getElementById('quiz-status');
    container.innerHTML = '';
    status.textContent  = '小状元请看，老师先演示一遍...';
    status.className    = 'text-blue-500 font-bold animate-pulse';
    modal.classList.remove('hidden');

    const writer = HanziWriter.create('quiz-writer-container', char, {
        width:300, height:300, padding:25, strokeColor:'#3b82f6',
        outlineColor:'#f1f5f9', drawingColor:'#1e293b', drawingWidth:14,
        showOutline:true, showCharacter:false
    });
    activeQuizWriter = writer;

    setTimeout(() => {
        writer.animateCharacter({
            onComplete: () => {
                speak('现在轮到你写啦');
                status.textContent = '演示完毕！请按笔顺书写';
                status.className   = 'text-amber-500 font-black animate-bounce';
                writer.quiz({
                    onComplete: () => {
                        status.textContent = '✨ 妙笔生花！写得真好！';
                        status.className   = 'text-green-500 font-black';
                        speak('太棒了');
                        updateItemScore(activeQuizId + '-quiz', 100);
                        const sb = document.getElementById(`score-${activeQuizId}`);
                        if (sb) sb.innerHTML = `<span class="text-green-500">✍️ 临摹完成</span>`;
                        setTimeout(() => { closeQuiz(); checkAllDone(); }, 1500);
                    }
                });
            }
        });
    }, 500);
}

function resetQuiz() { if (activeQuizWriter) { activeQuizWriter.cancelQuiz(); activeQuizWriter.quiz(); } }
function closeQuiz()  { document.getElementById('quizModal').classList.add('hidden'); if (activeQuizWriter) activeQuizWriter.cancelQuiz(); }

// ════════════════════════════════════════
//  分数管理
// ════════════════════════════════════════
function updateItemScore(id, score) {
    if (!itemScores[id] || score > itemScores[id]) {
        itemScores[id] = score;
        const total = Object.values(itemScores).reduce((a, b) => a + b, 0);
        document.getElementById('totalScore').textContent = total;
        updateProgress();
    }
}

function updateProgress() {
    // 计进度：单词录音 + 段落录音（笔顺作为额外奖励）
    const requiredIds = [
        ...currentLesson.words.map((_, i) => `word-${i}`),
        ...currentParas.map((_, i) => `para-${i}`)
    ];
    const done = requiredIds.filter(id => itemScores[id] !== undefined).length;
    const pct  = Math.round(done / totalItems * 100);
    document.getElementById('progressBar').style.width = `${pct}%`;
    document.getElementById('progressText').textContent = `${pct}%`;
}

function checkAllDone() {
    const requiredIds = [
        ...currentLesson.words.map((_, i) => `word-${i}`),
        ...currentParas.map((_, i) => `para-${i}`)
    ];
    if (requiredIds.every(id => itemScores[id] !== undefined)) {
        const total = Object.values(itemScores).reduce((a, b) => a + b, 0);
        saveAttemptToGAS(true);
        setTimeout(() => {
            document.getElementById('rewardName').textContent  = `${studentName} 功德圆满，全课通关！`;
            document.getElementById('rewardScore').textContent = total;
            showScreen('screenReward');
            launchConfetti();
        }, 1000);
    }
}

// ════════════════════════════════════════
//  GAS 数据存储
// ════════════════════════════════════════
async function saveAttemptToGAS(completed = false) {
    const total = Object.values(itemScores).reduce((a, b) => a + b, 0);
    try {
        if (!currentAttemptId) {
            // 新建练习记录
            const ref = await db.collection('attempts').add({
                lessonId:    currentLesson.lessonId,
                lessonTitle: currentLesson.title,
                unit:        currentLesson.unit,
                classCode,
                studentName,
                scores:      itemScores,
                totalScore:  total,
                startedAt:   firebase.firestore.FieldValue.serverTimestamp(),
                completedAt: completed ? firebase.firestore.FieldValue.serverTimestamp() : null
            });
            currentAttemptId = ref.id;
        } else {
            // 更新现有记录
            const update = { scores: itemScores, totalScore: total };
            if (completed) update.completedAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection('attempts').doc(currentAttemptId).update(update);
        }
    } catch(e) { /* 静默 */ }
}

function launchConfetti() {
    const colors = ['#3b82f6','#f43f5e','#f59e0b','#10b981','#8b5cf6'];
    for (let i = 0; i < 80; i++) {
        const div = document.createElement('div');
        div.className = 'confetti';
        div.style.left              = Math.random() * 100 + 'vw';
        div.style.backgroundColor   = colors[Math.floor(Math.random()*5)];
        div.style.animationDuration = Math.random() * 2 + 2 + 's';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 4000);
    }
}

async function createClass() {
    const cls  = document.getElementById('tcClassCode').value.trim().toUpperCase();
    const pin  = document.getElementById('tcPin').value;
    const pin2 = document.getElementById('tcPinConfirm').value;
    if (!cls)        { showMsg('请输入班级代码'); return; }
    if (pin.length < 4) { showMsg('密码至少 4 位'); return; }
    if (pin !== pin2)   { showMsg('两次密码不一致'); return; }
    try {
        const doc = await db.collection('classes').doc(cls).get();
        if (doc.exists) { showMsg('此班级代码已被使用，换一个试试'); return; }
        await db.collection('classes').doc(cls).set({
            pin, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showMsg(`班级 ${cls} 创建成功！`);
        document.getElementById('tcClassCode').value = '';
        document.getElementById('tcPin').value = '';
        document.getElementById('tcPinConfirm').value = '';
        teacherClassCode = cls;
        enterTeacherDashboard(cls);
    } catch(e) { showMsg('创建失败：' + e.message); }
}

async function teacherLogin() {
    const cls = document.getElementById('tlClassCode').value.trim().toUpperCase();
    const pin = document.getElementById('tlPin').value;
    if (!cls || !pin) { showMsg('请填写班级代码和密码'); return; }
    try {
        const doc = await db.collection('classes').doc(cls).get();
        if (!doc.exists)          { showMsg('找不到此班级，请先创建'); return; }
        if (doc.data().pin !== pin) { showMsg('密码错误');              return; }
        teacherClassCode = cls;
        enterTeacherDashboard(cls);
    } catch(e) { showMsg('登录失败：' + e.message); }
}

async function enterTeacherDashboard(cls) {
    document.getElementById('teacherAuthPanel').classList.add('hidden');
    document.getElementById('teacherDataPanel').classList.remove('hidden');
    document.getElementById('teacherLogoutBtn').classList.remove('hidden');
    document.getElementById('teacherLogoutPlaceholder').classList.add('hidden');
    document.getElementById('teacherClassLabel').textContent = cls + ' 班';

    // 填充课题下拉
    const sel = document.getElementById('teacherLessonSelect');
    sel.innerHTML = '<option value="">— 请选择 —</option>' +
        allLessons.map(l => `<option value="${l.lessonId}">${l.title}</option>`).join('');

    // 预载全班 attempts
    const snap = await db.collection('attempts').where('classCode', '==', cls).get();
    teacherAttempts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function loadTeacherAnalytics() {
    const lessonId = document.getElementById('teacherLessonSelect').value;

        content.innerHTML = '<div class="text-center text-slate-300 py-10 text-sm">请选择课题查看数据</div>';
        return;
    }
    const attempts = teacherAttempts
        .filter(a => a.lessonId === lessonId)
        .sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0));

    const completed = attempts.filter(a => a.completedAt);
    const avg = completed.length
        ? Math.round(completed.reduce((s, a) => s + (a.totalScore || 0), 0) / completed.length) : 0;

    content.innerHTML = `
    <div class="grid grid-cols-3 gap-2 mb-5">
        ${[['参与', attempts.length, 'blue'], ['完成', completed.length, 'green'], ['平均分', avg, 'amber']]
            .map(([l, v, c]) => `
        <div class="bg-${c}-50 rounded-2xl p-3 text-center border border-${c}-100">
            <div class="text-xl font-black text-${c}-600">${v}</div>
            <div class="text-[10px] font-bold text-${c}-400">${l}</div>
        </div>`).join('')}
    </div>
    ${attempts.length ? `
    <div class="overflow-x-auto rounded-2xl border border-slate-100 mb-4">
        <table class="w-full text-sm">
            <thead class="bg-slate-50">
                <tr>
                    <th class="text-left px-4 py-2.5 font-bold text-slate-500 text-xs">代号</th>
                    <th class="text-center px-3 py-2.5 font-bold text-slate-500 text-xs">总分</th>
                    <th class="text-center px-3 py-2.5 font-bold text-slate-500 text-xs">完成</th>
                </tr>
            </thead>
            <tbody>
                ${attempts.map(a => `
                <tr class="border-t border-slate-50">
                    <td class="px-4 py-3 font-bold text-slate-700">${a.studentName}</td>
                    <td class="px-3 py-3 text-center font-black text-blue-600">${a.totalScore ?? '—'}</td>
                    <td class="px-3 py-3 text-center text-lg">${a.completedAt ? '✅' : '🔄'}</td>
                </tr>`).join('')}
            </tbody>
        </table>
    </div>
    <button onclick="downloadTeacherCSV()"
        class="w-full py-3 rounded-2xl bg-emerald-50 text-emerald-600 font-black hover:bg-emerald-100 transition-all text-sm flex items-center justify-center gap-2">
        <i class="fas fa-file-csv"></i> 下载 CSV
    </button>` : '<div class="text-center text-slate-300 py-8 text-sm">这课还没有学生练习</div>'}`;
}

function downloadTeacherCSV() {
    const lessonId = document.getElementById('teacherLessonSelect').value;
    const lessonTitle = allLessons.find(l => l.lessonId === lessonId)?.title || '成绩单';
    const attempts = teacherAttempts.filter(a => a.lessonId === lessonId)
        .sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0));
    if (!attempts.length) { showMsg('没有数据可导出'); return; }
    const rows = [
        ['代号', '总分', '完成状态', '时间'],
        ...attempts.map(a => [
            a.studentName, a.totalScore ?? '',
            a.completedAt ? '完成' : '进行中',
            a.startedAt?.toDate?.()?.toLocaleString('zh-CN', { hour12: false }) || ''
        ])
    ];
    const csv  = '﻿' + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `${lessonTitle}_${teacherClassCode}.csv`; a.click();
    URL.revokeObjectURL(url);
}

function teacherLogout() {
    teacherClassCode = '';
    teacherAttempts  = [];
    openTeacherMode();
}

// ════════════════════════════════════════
//  排行榜
// ════════════════════════════════════════
let lbAttempts = [];

function openLeaderboard() {
    const cls = classCode || localStorage.getItem('shizi_classCode') || '';
    document.getElementById('lbClassBadge').textContent = cls || '';
    showScreen('screenLeaderboard');

    // 填充课题筛选
    const sel = document.getElementById('lbLessonFilter');
    sel.innerHTML = '<option value="">全部课题</option>' +
        allLessons.map(l => `<option value="${l.lessonId}">${l.title}</option>`).join('');

    if (cls) {
        document.getElementById('lbInputSection').classList.add('hidden');
        document.getElementById('lbFilterSection').classList.remove('hidden');
        loadLeaderboard(cls);
    } else {
        document.getElementById('lbInputSection').classList.remove('hidden');
        document.getElementById('lbFilterSection').classList.add('hidden');
        document.getElementById('lbLoading').classList.add('hidden');
        document.getElementById('lbContent').classList.add('hidden');
    }
}

async function loadLeaderboard(cls) {
    if (!cls) return;
    document.getElementById('lbClassBadge').textContent = cls;
    document.getElementById('lbLoading').classList.remove('hidden');
    document.getElementById('lbContent').classList.add('hidden');
    try {
        const snap = await db.collection('attempts').where('classCode', '==', cls).get();
        lbAttempts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        document.getElementById('lbInputSection').classList.add('hidden');
        document.getElementById('lbFilterSection').classList.remove('hidden');
        document.getElementById('lbLoading').classList.add('hidden');
        document.getElementById('lbContent').classList.remove('hidden');
        renderLeaderboard();
    } catch(e) {
        document.getElementById('lbLoading').innerHTML =
            `<div class="text-red-400 text-sm">加载失败：${e.message}</div>`;
    }
}

function reloadLeaderboard() {
    const cls = classCode || localStorage.getItem('shizi_classCode') || '';
    if (cls) loadLeaderboard(cls);
}

function computeLbRankings(lessonId) {
    const filtered = lessonId ? lbAttempts.filter(a => a.lessonId === lessonId) : lbAttempts;
    const map = {};
    for (const a of filtered) {
        const name = a.studentName;
        if (!map[name]) map[name] = { name, lessonBest: {} };
        const lid = a.lessonId;
        if (!map[name].lessonBest[lid] || (a.totalScore || 0) > map[name].lessonBest[lid])
            map[name].lessonBest[lid] = a.totalScore || 0;
    }
    for (const s of Object.values(map))
        s.totalScore = Object.values(s.lessonBest).reduce((a, b) => a + b, 0);
    return Object.values(map).sort((a, b) => b.totalScore - a.totalScore);
}

function renderLeaderboard() {
    const lessonId = document.getElementById('lbLessonFilter').value;
    const rankings = computeLbRankings(lessonId);
    const podiumEl = document.getElementById('lbPodium');
    const listEl   = document.getElementById('lbList');
    const emptyEl  = document.getElementById('lbEmpty');
    const statsEl  = document.getElementById('lbStats');

    if (!rankings.length) {
        podiumEl.innerHTML = '';
        listEl.innerHTML   = '';
        emptyEl.classList.remove('hidden');
        statsEl.textContent = '';
        return;
    }
    emptyEl.classList.add('hidden');

    // 领奖台（前三名）
    const top3 = rankings.slice(0, Math.min(3, rankings.length));
    const slots = [
        { rank:1, bg:'bg-amber-400',  barH:140, medal:'🥇', numColor:'text-amber-800'  },
        { rank:2, bg:'bg-slate-300',  barH:100, medal:'🥈', numColor:'text-slate-600'  },
        { rank:3, bg:'bg-orange-400', barH:76,  medal:'🥉', numColor:'text-orange-900' },
    ];
    const display = top3.length === 1 ? [slots[0]] :
                    top3.length === 2 ? [slots[1], slots[0]] :
                    [slots[1], slots[0], slots[2]];

    podiumEl.innerHTML = display.map(s => {
        const st = top3[s.rank - 1];
        if (!st) return '';
        return `
        <div class="flex flex-col items-center flex-1 max-w-[150px]">
            <div class="text-4xl mb-1">${s.medal}</div>
            <div class="font-black text-slate-800 text-sm mb-0.5 truncate max-w-full px-1 text-center">${st.name}</div>
            <div class="font-black text-lg text-slate-600 mb-2">${st.totalScore}分</div>
            <div class="${s.bg} w-full rounded-t-2xl flex items-start justify-center pt-3 shadow-lg"
                style="height:${s.barH}px">
                <span class="font-black text-3xl ${s.numColor} opacity-60">${s.rank}</span>
            </div>
        </div>`;
    }).join('');

    // 第4名以后列表
    listEl.innerHTML = rankings.slice(3).map((s, i) => `
    <div class="bg-white rounded-2xl px-5 py-4 flex items-center gap-4 shadow-sm border border-slate-100">
        <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center font-black text-slate-400 text-lg shrink-0">${i + 4}</div>
        <div class="flex-1 font-bold text-slate-800 truncate">${s.name}</div>
        <div class="font-black text-blue-600 text-lg shrink-0">${s.totalScore}<span class="text-xs font-normal text-slate-400 ml-0.5">分</span></div>
    </div>`).join('');

    // 底部统计
    const avg = Math.round(rankings.reduce((a, b) => a + b.totalScore, 0) / rankings.length);
    statsEl.innerHTML = `共 ${rankings.length} 位同学 &nbsp;·&nbsp; 最高分 ${rankings[0].totalScore} &nbsp;·&nbsp; 平均分 ${avg}`;
}

function showMsg(msg) {
    const m = document.createElement('div');
    m.className = 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-2xl shadow-2xl z-[150] font-bold text-sm';
    m.textContent = msg;
    document.body.appendChild(m);
    setTimeout(() => m.remove(), 2500);
}
</script>
