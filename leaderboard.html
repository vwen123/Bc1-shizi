<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小状元排行榜</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: linear-gradient(135deg, #fef3c7 0%, #dbeafe 100%); min-height: 100vh; }
        .podium-bar { transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .rank-row { animation: slideIn 0.4s ease both; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-16px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- 输入班级代码 -->
<div id="screenInput" class="hidden max-w-md mx-auto px-6 py-16">
    <div class="bg-white rounded-[2.5rem] shadow-2xl border-b-8 border-amber-500 p-8 text-center">
        <div class="text-7xl mb-4">🏆</div>
        <h1 class="text-3xl font-black text-slate-800 mb-2">班级排行榜</h1>
        <p class="text-slate-400 mb-8">输入班级代码查看同学排名</p>
        <input id="inputClass" type="text" placeholder="班级代码（如 YANI1A）"
            class="w-full px-6 py-4 border-2 border-slate-100 rounded-2xl text-center text-xl focus:outline-none focus:border-amber-400 focus:ring-4 focus:ring-amber-50 transition-all bg-slate-50/50 uppercase mb-4">
        <button onclick="enterClass()"
            class="w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl transition-all">
            查看排行榜
        </button>
        <a href="index.html" class="block mt-4 text-sm text-slate-400 hover:text-slate-600">← 返回学生页面</a>
    </div>
</div>

<!-- 排行榜主页 -->
<div id="screenBoard" class="hidden max-w-2xl mx-auto px-4 py-8">

    <!-- 顶部导航 -->
    <div class="flex items-center justify-between mb-8">
        <a href="index.html"
            class="w-10 h-10 bg-white rounded-2xl shadow-sm flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-all">
            <i class="fas fa-home"></i>
        </a>
        <div class="text-center">
            <h1 class="text-2xl font-black text-slate-800">🏆 排行榜</h1>
            <div id="classCodeBadge" class="text-xs font-black text-amber-600 uppercase tracking-widest mt-0.5 bg-amber-50 px-3 py-0.5 rounded-full inline-block"></div>
        </div>
        <button onclick="reloadData()"
            class="w-10 h-10 bg-white rounded-2xl shadow-sm flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-all">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>

    <!-- 课题筛选 -->
    <div class="bg-white rounded-2xl shadow-sm p-4 mb-6 flex items-center gap-3">
        <label class="text-sm font-bold text-slate-500 shrink-0"><i class="fas fa-filter mr-1"></i>课题：</label>
        <select id="lessonFilter" onchange="renderRankings()"
            class="flex-1 p-2.5 border-2 border-slate-100 rounded-xl text-sm focus:outline-none focus:border-amber-400 font-bold">
            <option value="">全部课题（总分）</option>
        </select>
    </div>

    <!-- 加载中 -->
    <div id="boardLoading" class="text-center py-20 text-slate-400">
        <div class="w-10 h-10 border-4 border-amber-300 border-t-transparent rounded-full spin mx-auto mb-4"></div>
        加载排行榜...
    </div>

    <!-- 排行榜内容 -->
    <div id="boardContent" class="hidden">

        <!-- 前三名领奖台 -->
        <div id="podium" class="flex items-end justify-center gap-3 mb-8 px-2 min-h-[200px]"></div>

        <!-- 4名以后列表 -->
        <div id="rankList" class="space-y-3 mb-8"></div>

        <!-- 空状态 -->
        <div id="emptyState" class="hidden text-center py-20">
            <div class="text-6xl mb-4">📝</div>
            <div class="font-black text-slate-400 text-lg">还没有同学完成练习</div>
            <div class="text-slate-300 text-sm mt-2">快去努力练习吧！</div>
        </div>

        <!-- 底部统计 -->
        <div id="statsBar" class="bg-white rounded-2xl p-4 text-center text-xs text-slate-400 font-bold"></div>
    </div>

</div>

<script>
firebase.initializeApp({
    apiKey:            "AIzaSyCVnBotyPuwS9xfUl7YCN2jS7gXUHIQyHc",
    authDomain:        "huawen-class.firebaseapp.com",
    projectId:         "huawen-class",
    storageBucket:     "huawen-class.firebasestorage.app",
    messagingSenderId: "606012248377",
    appId:             "1:606012248377:web:7f55bb58ed2abd1c4458e8"
});
const db = firebase.firestore();

let classCode   = '';
let allAttempts = [];
let allLessons  = [];

// 从 URL 读取班级代码
const urlParams = new URLSearchParams(location.search);
const urlClass  = urlParams.get('class');

window.onload = () => {
    if (urlClass) {
        classCode = urlClass.toUpperCase();
        showBoard();
    } else {
        document.getElementById('screenInput').classList.remove('hidden');
    }
};

function enterClass() {
    const cls = document.getElementById('inputClass').value.trim().toUpperCase();
    if (!cls) return;
    classCode = cls;
    history.replaceState({}, '', `?class=${cls}`);
    showBoard();
}

document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('screenInput').style.display !== 'none') {
        enterClass();
    }
});

function showBoard() {
    document.getElementById('screenInput').classList.add('hidden');
    document.getElementById('screenBoard').classList.remove('hidden');
    document.getElementById('classCodeBadge').textContent = classCode;
    loadData();
}

async function loadData() {
    document.getElementById('boardLoading').classList.remove('hidden');
    document.getElementById('boardContent').classList.add('hidden');
    try {
        const [attSnap, lesSnap] = await Promise.all([
            db.collection('attempts').where('classCode', '==', classCode).get(),
            db.collection('lessons').where('status', '==', 'published').get()
        ]);

        allAttempts = attSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        allLessons  = lesSnap.docs
            .map(d => ({ lessonId: d.id, ...d.data() }))
            .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));

        const sel = document.getElementById('lessonFilter');
        sel.innerHTML = '<option value="">全部课题（总分）</option>' +
            allLessons.map(l => `<option value="${l.lessonId}">${l.title}</option>`).join('');

        document.getElementById('boardLoading').classList.add('hidden');
        document.getElementById('boardContent').classList.remove('hidden');
        renderRankings();
    } catch(e) {
        document.getElementById('boardLoading').innerHTML =
            `<div class="text-red-400 py-10">加载失败：${e.message}</div>`;
    }
}

function computeRankings(lessonId) {
    const filtered = lessonId ? allAttempts.filter(a => a.lessonId === lessonId) : allAttempts;
    const map = {};
    for (const a of filtered) {
        const name = a.studentName;
        if (!map[name]) map[name] = { name, lessonBest: {}, totalScore: 0 };
        const lid = a.lessonId;
        if (!map[name].lessonBest[lid] || (a.totalScore || 0) > map[name].lessonBest[lid]) {
            map[name].lessonBest[lid] = a.totalScore || 0;
        }
    }
    for (const s of Object.values(map)) {
        s.totalScore = lessonId
            ? (s.lessonBest[lessonId] || 0)
            : Object.values(s.lessonBest).reduce((a, b) => a + b, 0);
    }
    return Object.values(map).sort((a, b) => b.totalScore - a.totalScore);
}

function renderRankings() {
    const lessonId = document.getElementById('lessonFilter').value;
    const rankings = computeRankings(lessonId);
    const empty    = document.getElementById('emptyState');
    const podiumEl = document.getElementById('podium');
    const listEl   = document.getElementById('rankList');
    const statsEl  = document.getElementById('statsBar');

    if (!rankings.length) {
        podiumEl.innerHTML = '';
        listEl.innerHTML   = '';
        empty.classList.remove('hidden');
        statsEl.textContent = '';
        return;
    }
    empty.classList.add('hidden');

    // ── 前三名领奖台 ────────────────────────────────────────────
    const top3 = rankings.slice(0, Math.min(3, rankings.length));

    // 显示顺序：2nd | 1st | 3rd
    const slots = [
        { rank: 1, cfg: { bg: 'bg-amber-400', barH: 140, medal: '🥇', numColor: 'text-amber-800', scoreColor: 'text-amber-700' } },
        { rank: 2, cfg: { bg: 'bg-slate-300', barH: 100, medal: '🥈', numColor: 'text-slate-600', scoreColor: 'text-slate-600' } },
        { rank: 3, cfg: { bg: 'bg-orange-400', barH: 76,  medal: '🥉', numColor: 'text-orange-900', scoreColor: 'text-orange-700' } },
    ];

    const displayOrder = top3.length === 1 ? [slots[0]] :
                         top3.length === 2 ? [slots[1], slots[0]] :
                         [slots[1], slots[0], slots[2]];

    podiumEl.innerHTML = displayOrder.map((s, di) => {
        const student = top3[s.rank - 1];
        if (!student) return '';
        const c = s.cfg;
        return `
        <div class="flex flex-col items-center flex-1 max-w-[160px]" style="animation-delay:${di * 0.1}s">
            <div class="text-4xl mb-1">${c.medal}</div>
            <div class="font-black text-slate-800 text-sm mb-0.5 truncate max-w-full px-1 text-center leading-tight">${student.name}</div>
            <div class="font-black text-lg ${c.scoreColor} mb-2">${student.totalScore}<span class="text-xs font-bold ml-0.5">分</span></div>
            <div class="${c.bg} w-full rounded-t-2xl flex items-start justify-center pt-3 shadow-lg"
                style="height:${c.barH}px">
                <span class="font-black text-3xl ${c.numColor} opacity-60">${s.rank}</span>
            </div>
        </div>`;
    }).join('');

    // ── 第 4 名以后 ──────────────────────────────────────────────
    const rest = rankings.slice(3);
    listEl.innerHTML = rest.map((s, i) => {
        const rank  = i + 4;
        const stars = Math.min(5, Math.ceil(s.totalScore / (lessonId ? 80 : 200)));
        return `
        <div class="rank-row bg-white rounded-2xl px-5 py-4 flex items-center gap-4 shadow-sm border border-slate-100"
            style="animation-delay:${i * 0.05}s">
            <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center font-black text-slate-400 text-lg shrink-0">${rank}</div>
            <div class="flex-1 font-bold text-slate-800 truncate">${s.name}</div>
            <div class="text-amber-400 text-sm">${'⭐'.repeat(stars)}</div>
            <div class="font-black text-blue-600 text-lg shrink-0">${s.totalScore}<span class="text-xs font-normal text-slate-400 ml-0.5">分</span></div>
        </div>`;
    }).join('');

    // ── 底部统计 ─────────────────────────────────────────────────
    const totalStudents  = rankings.length;
    const topScore       = rankings[0]?.totalScore || 0;
    const avgScore       = Math.round(rankings.reduce((a, b) => a + b.totalScore, 0) / totalStudents);
    statsEl.innerHTML = `共 ${totalStudents} 位同学参与 &nbsp;·&nbsp; 最高分 ${topScore} &nbsp;·&nbsp; 平均分 ${avgScore}`;
}

async function reloadData() {
    await loadData();
}
</script>
</body>
</html>
