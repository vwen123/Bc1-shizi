<body>

<!-- 主控制台 -->

<script>

firebase.initializeApp({

    storageBucket:     "huawen-class.firebasestorage.app",

const db = firebase.firestore();

const TEACHER_PIN = "8888"; // 修改此处更改密码
const MY_SCHOOL   = "SJK(C) YANI"; // 本校标准名称，对应 index.html?school=yani
let filterMySchool = false;

// ── PIN 验证 ──────────────────────────────────────────────────
function checkPin() {
    const val = document.getElementById('pinInput').value;
    if (val === TEACHER_PIN || localStorage.getItem('teacher_auth') === TEACHER_PIN) {
        localStorage.setItem('teacher_auth', TEACHER_PIN);

        document.getElementById('dashboard').classList.remove('hidden');

}

document.getElementById('pinInput').addEventListener('keydown', e => {

// 自动登录（已验证过）

}

    const IMG = 'https://vwen123.github.io/Bc1-shizi/images/';

        { unit:'第一单元·新的开始', title:'一、上学了', content:'上学了，上学了。花儿跟我招招手，太阳跟我一起走，一起走到校门口。',

        { unit:'第一单元·新的开始', title:'二、早操', content:'小鸟儿，起得早，跳来跳去在树枝上做早操。小朋友，起得早，跑来跑去在草地上做早操。',
          words:[{word:'小鸟',pinyin:'xiǎo niǎo',emoji:'🐦',imgUrl:IMG+'xiao-niao.png'},{word:'早操',pinyin:'zǎo cāo',emoji:'🤸',imgUrl:IMG+'zao-cao.png'},{word:'树枝',pinyin:'shù zhī',emoji:'🌿',imgUrl:IMG+'shu-zhi.png'},{word:'草地',pinyin:'cǎo dì',emoji:'🌱',imgUrl:IMG+'cao-di.png'}]},
        { unit:'第二单元·走进教室', title:'一、识字读书长知识', content:'上课了，来识字，识了字儿会读书。读儿歌，读故事，天天学习长知识。',
          words:[{word:'识字',pinyin:'shí zì',emoji:'📝',imgUrl:IMG+'shi-zi.png'},{word:'读书',pinyin:'dú shū',emoji:'📖',imgUrl:IMG+'du-shu.png'},{word:'知识',pinyin:'zhī shi',emoji:'💡',imgUrl:IMG+'zhi-shi.png'},{word:'儿歌',pinyin:'ér gē',emoji:'🎵',imgUrl:IMG+'er-ge.png'}]},
        { unit:'第二单元·走进教室', title:'二、学写字', content:'小朋友，学写字，一笔一画要写好，眼到手到心也到，笔画笔顺错不了。',

        { unit:'第三单元·我爱我的家', title:'二、星星', content:'天上星星那么多，这一颗我妈妈，那一颗我爸爸，中间的一颗是我。三颗星星靠得那样近，那样亲，三颗星星那样明。',

// ── 标签切换 ──────────────────────────────────────────────────
function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('text-slate-500'); });
    btn.classList.add('active'); btn.classList.remove('text-slate-500');
    ['lessons', 'analytics', 'progress'].forEach(t => document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab));
    if (tab === 'analytics') populateAnalyticsSelect();
    if (tab === 'progress')  loadProgressBoard();
}

// ════════════════════════════════════════════════════════════════
//  课程管理
// ════════════════════════════════════════════════════════════════
async function loadLessons() {
    const container = document.getElementById('lessonList');
    container.innerHTML = '<div class="text-center text-slate-400 py-10">加载中...</div>';
    try {
        const snap = await db.collection('lessons').get();
        const attSnap = await db.collection('attempts').get();
        const attByLesson = {};
        attSnap.docs.forEach(d => {
            const lid = d.data().lessonId;
            if (!attByLesson[lid]) attByLesson[lid] = { total: 0, completed: 0 };
            attByLesson[lid].total++;
            if (d.data().completedAt) attByLesson[lid].completed++;
        });
        allLessons = snap.docs
            .map(d => {
                const data = d.data();
                const att  = attByLesson[d.id] || { total: 0, completed: 0 };
                return { lessonId: d.id, ...data, attemptCount: att.total, completedCount: att.completed };
            })
            .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0))
            .reverse();
        renderLessons();
    } catch(e) {
        allLessons = [];
        renderLessons();
        container.insertAdjacentHTML('beforeend',
            `<div class="text-red-400 text-sm text-center mt-4">载入失败：${e.message}</div>`);
    }
}

function renderLessons() {
    const container = document.getElementById('lessonList');
    if (!allLessons.length) {
        document.getElementById('setupBanner').classList.remove('hidden');
        container.innerHTML = '<div class="text-center text-slate-300 py-10"><i class="fas fa-book-open text-4xl mb-3 block"></i>还没有课程</div>';
        return;
    }
    document.getElementById('setupBanner').classList.add('hidden');
    container.innerHTML = allLessons.map(l => `
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
        <!-- 课程标题行 -->
        <div class="px-6 py-5 flex items-center justify-between">
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                    <span class="text-xs font-bold text-slate-400">${l.unit}</span>
                    <span class="px-2 py-0.5 rounded-full text-xs font-bold status-${l.status}">${l.status === 'published' ? '✅ 已发布' : '⏳ 草稿'}</span>
                    <span class="text-xs text-slate-300">· ${l.attemptCount} 人练习</span>
                </div>
                <h3 class="font-black text-slate-800 text-lg truncate">${l.title}</h3>
                <p class="text-xs text-slate-400 mt-0.5 line-clamp-1">${(l.content || '').slice(0,50)}…</p>
            </div>
            <div class="flex items-center gap-2 ml-4 shrink-0">
                <button onclick="editLesson('${l.lessonId}')" class="w-9 h-9 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-500 transition-all flex items-center justify-center text-xs">
                    <i class="fas fa-edit"></i>
                </button>
                <button onclick="confirmDelete('${l.lessonId}', '${l.title}')" class="w-9 h-9 rounded-xl bg-rose-50 hover:bg-rose-100 text-rose-400 transition-all flex items-center justify-center text-xs">
                    <i class="fas fa-trash"></i>
                </button>
                <button onclick="copyLink('${l.lessonId}')" class="w-9 h-9 rounded-xl bg-blue-50 hover:bg-blue-100 text-blue-500 transition-all flex items-center justify-center text-xs">
                    <i class="fas fa-link"></i>
                </button>
            </div>
        </div>

        <!-- 生词列表 -->
        <div class="border-t border-slate-50 px-6 py-4 bg-slate-50/50">
            <div class="flex flex-wrap gap-3">
                ${(l.words || []).map((w) => renderWordChip(w)).join('')}
            </div>
        </div>
    </div>`).join('');
}

function renderWordChip(w) {
    return `
    <div class="flex items-center gap-2 bg-white rounded-2xl px-3 py-2 border border-slate-100 shadow-sm">
        ${w.imgUrl
            ? `<img src="${w.imgUrl}" class="img-cell" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
            : ''}
        <div class="img-placeholder bg-slate-100" ${w.imgUrl ? 'style="display:none"' : ''}>${w.emoji||'📚'}</div>
        <div>
            <div class="font-bold text-slate-800 text-sm">${w.word}</div>
            <div class="text-xs text-slate-400">${w.pinyin}</div>
        </div>
        ${!w.imgUrl ? '<span class="text-[10px] text-slate-300 ml-1">无图</span>' : ''}
    </div>`;
}

// ── 表单：新建 / 编辑 ──────────────────────────────────────────
function toggleForm() {
    const form    = document.getElementById('lessonForm');
    const chevron = document.getElementById('formChevron');
    const isOpen  = !form.classList.contains('hidden');
    form.classList.toggle('hidden', isOpen);
    chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
    if (!isOpen && !document.getElementById('wordRows').children.length) addWordRow();
}

// ── 自动拼音 ──────────────────────────────────────────────────
function autoPinyin(wordInput, pinyinInput) {
    const word = wordInput.value.trim();
    if (!word) return;
    try {
        // pinyin-pro UMD 全局对象
        const py = (window.pinyinPro?.pinyin || window.pinyin);
        if (py) {
            pinyinInput.value = py(word, { toneType: 'symbol', separator: ' ' });
        }
    } catch(e) { /* 库未加载时静默跳过 */ }
}

function getFormWords() {

            pinyin: inputs[1]?.value.trim() || '',
            emoji:  inputs[2]?.value.trim() || '📚',
            imgUrl: inputs[3]?.value.trim() || ''
        };
    }).filter(w => w.word);

async function saveLesson() {
    const editingId = document.getElementById('editingId').value;
    const unit      = document.getElementById('f-unit').value.trim();
    const title     = document.getElementById('f-title').value.trim();
    const content   = document.getElementById('f-content').value.trim();
    const words     = getFormWords();

    if (!title || !content) { toast('请填写课题标题和课文内容', true); return; }
    if (!words.length)       { toast('请至少添加一个生词', true);   return; }

    try {
        if (editingId) {
            await db.collection('lessons').doc(editingId).update({ unit, title, content, words });
            toast('课程已更新 ✅');
        } else {
            await db.collection('lessons').add({ unit, title, content, words, status: 'draft', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            toast('课程已创建 ✅');
        }
        cancelForm();
        await loadLessons();
    } catch(e) { toast('保存失败：' + e.message, true); }
}

function editLesson(lessonId) {
    const l = allLessons.find(x => x.lessonId === lessonId);
    if (!l) return;
    document.getElementById('editingId').value   = lessonId;
    document.getElementById('f-unit').value      = l.unit    || '';
    document.getElementById('f-title').value     = l.title   || '';
    document.getElementById('f-content').value   = l.content || '';
    document.getElementById('wordRows').innerHTML = '';
    (l.words || []).forEach(w => addWordRow(w));

    // 打开表单并滚到顶部
    document.getElementById('lessonForm').classList.remove('hidden');
    document.getElementById('formChevron').style.transform = 'rotate(180deg)';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelForm() {
    document.getElementById('editingId').value    = '';
    document.getElementById('f-unit').value       = '';
    document.getElementById('f-title').value      = '';
    document.getElementById('f-content').value    = '';
    document.getElementById('wordRows').innerHTML  = '';
    document.getElementById('lessonForm').classList.add('hidden');
    document.getElementById('formChevron').style.transform = '';
}

async function loadAnalytics() {
    const lessonId = document.getElementById('analyticsLessonSelect').value;
    const content  = document.getElementById('analyticsContent');
    if (!lessonId) { content.innerHTML = '<div class="text-center text-slate-400 py-16">请选择课程查看数据</div>'; return; }

    content.innerHTML = '<div class="text-center text-slate-400 py-10">加载中...</div>';
    try {
        const lessonDoc = await db.collection('lessons').doc(lessonId).get();
        const lesson    = { lessonId, ...lessonDoc.data() };
        const attSnap   = await db.collection('attempts')
            .where('lessonId', '==', lessonId)
            .orderBy('startedAt', 'desc').get();
        let attempts  = attSnap.docs.map(d => ({ attemptId: d.id, ...d.data(),
            startedAt:   d.data().startedAt?.toDate?.()?.toISOString() || '',

let _exportLesson   = null;
let _exportAttempts = [];

function downloadCSV() {
    if (!_exportAttempts.length) { toast('没有数据可导出', true); return; }
    const rows = [
        ['学校', '姓名', '总分', '第一关(认词)', '第二关(朗读)', '游戏闯关', '完成时间'],
        ..._exportAttempts.map(a => {
            const sc = a.scores || {};
            const w  = [0,1,2,3].reduce((s,i) => s + (sc[`word-${i}`]||0), 0);
            const p  = [0,1,2].reduce((s,i)   => s + (sc[`para-${i}`]||0), 0);
            const g  = (sc['game-img']||0) + (sc['game-audio']||0);
            return [
                a.school ?? '',
                a.studentName,
                a.totalScore ?? '',
                w || '',
                p || '',
                g || '',
                a.completedAt ? new Date(a.completedAt).toLocaleString('zh-CN',{hour12:false}) : ''
            ];
        })
    ];
    const bom = '﻿';
    const csv = bom + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${_exportLesson?.title || '成绩单'}_${new Date().toLocaleDateString('zh-CN')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

function downloadPDF() {
    if (!_exportAttempts.length) { toast('没有数据可导出', true); return; }
    const title    = _exportLesson?.title || '成绩单';
    const date     = new Date().toLocaleDateString('zh-CN');
    const rows     = _exportAttempts.map(a => {
        const sc = a.scores || {};
        const w  = [0,1,2,3].reduce((s,i) => s + (sc[`word-${i}`]||0), 0);
        const p  = [0,1,2].reduce((s,i)   => s + (sc[`para-${i}`]||0), 0);
        const g  = (sc['game-img']||0) + (sc['game-audio']||0);
        return `
        <tr>
            <td style="color:#64748b">${a.school || '—'}</td>
            <td>${a.studentName}</td>
            <td style="text-align:center;font-weight:900;color:#3b82f6">${a.totalScore ?? '—'}</td>
            <td style="text-align:center">${w || '—'}</td>
            <td style="text-align:center">${p || '—'}</td>
            <td style="text-align:center">${g || '—'}</td>
            <td style="color:#94a3b8;font-size:11px">${a.completedAt ? new Date(a.completedAt).toLocaleString('zh-CN',{hour12:false}) : ''}</td>

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head>
        <meta charset="UTF-8">
        <title>${title} 成绩单</title>
        <style>
            body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; padding: 40px; color: #1e293b; }

async function loadProgressBoard() {
    const board = document.getElementById('progressBoard');
    board.innerHTML = '<div class="text-center text-slate-400 py-10">加载中...</div>';
    try {
        const attSnap = await db.collection('attempts').get();
        let attempts = attSnap.docs.map(d => d.data());
        if (filterMySchool) attempts = attempts.filter(a => a.school === MY_SCHOOL);

        const lessons = allLessons.filter(l => l.status === 'published');
        if (!lessons.length) {
            board.innerHTML = '<div class="text-center text-slate-300 py-10">还没有发布的课程</div>';
            return;
        }

        // 每位学生每课的最佳状态
        const statusMap = {};   // studentName → lessonId → 'done'|'partial'
        const schoolMap = {};   // studentName → school
        for (const a of attempts) {
            const s = a.studentName; const l = a.lessonId;
            if (!s || !l) continue;
            if (!statusMap[s]) statusMap[s] = {};
            if (a.school && !schoolMap[s]) schoolMap[s] = a.school;
            if (a.completedAt) statusMap[s][l] = 'done';
            else if (!statusMap[s][l]) statusMap[s][l] = 'partial';
        }

        const students = Object.keys(statusMap).sort();
        if (!students.length) {
            const filterBtnClassEmpty = filterMySchool
                ? 'bg-emerald-500 text-white border-emerald-500'
                : 'border-slate-200 text-slate-400 hover:border-emerald-300';
            board.innerHTML = `
            <div class="flex justify-end mb-3">
                <button onclick="toggleSchoolFilter()"
                    class="school-filter-btn text-xs px-4 py-2.5 rounded-xl font-bold border-2 transition-all whitespace-nowrap ${filterBtnClassEmpty}">
                    ✅ 只看本校学生
                </button>
            </div>
            <div class="text-center text-slate-300 py-10">还没有学生练习数据</div>`;
            return;
        }

        // 统计每课完成人数
        const doneCount = {};
        lessons.forEach(l => {
            doneCount[l.lessonId] = students.filter(s => statusMap[s][l.lessonId] === 'done').length;
        });

        const filterBtnClass = filterMySchool
            ? 'bg-emerald-500 text-white border-emerald-500'
            : 'border-slate-200 text-slate-400 hover:border-emerald-300';
        board.innerHTML = `
        <div class="flex justify-end mb-3">
            <button onclick="toggleSchoolFilter()"
                class="school-filter-btn text-xs px-4 py-2.5 rounded-xl font-bold border-2 transition-all whitespace-nowrap ${filterBtnClass}">
                ✅ 只看本校学生
            </button>
        </div>
        <div class="overflow-x-auto rounded-3xl border border-slate-100 shadow-sm bg-white">
            <table class="text-sm border-collapse w-full">
                <thead>
                    <tr class="bg-slate-50">
                        <th class="text-left px-5 py-3 font-bold text-slate-500 sticky left-0 bg-slate-50 border-b border-slate-100 min-w-[100px]">
                            学生 <span class="text-slate-300 font-normal">(${students.length})</span>
                        </th>
                        ${lessons.map(l => `
                        <th class="px-4 py-3 font-bold text-slate-500 border-b border-slate-100 text-center whitespace-nowrap text-xs min-w-[80px]">
                            <div>${l.title}</div>
                            <div class="text-[10px] text-green-500 font-black mt-0.5">${doneCount[l.lessonId]}/${students.length} 完成</div>
                        </th>`).join('')}
                    </tr>
                </thead>
                <tbody>
                    ${students.map((student, si) => `
                    <tr class="${si % 2 === 0 ? '' : 'bg-slate-50/50'} hover:bg-blue-50/30 transition-colors">
                        <td class="px-5 py-3 sticky left-0 ${si % 2 === 0 ? 'bg-white' : 'bg-slate-50/50'} border-b border-slate-50">
                            <div class="font-bold text-slate-700">${student}</div>
                            ${schoolMap[student] ? `<div class="text-xs text-slate-400 mt-0.5">${schoolMap[student]}</div>` : ''}
                        </td>
                        ${lessons.map(l => {
                            const st = statusMap[student]?.[l.lessonId];
                            return `<td class="px-4 py-3 text-center text-xl border-b border-slate-50">${
                                st === 'done' ? '✅' : st === 'partial' ? '🔄' : '⬜'
                            }</td>`;
                        }).join('')}
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>
        <div class="flex gap-6 mt-4 px-2 text-xs font-bold text-slate-400">
            <span>✅ 已完成</span><span>🔄 练习中</span><span>⬜ 未开始</span>
        </div>`;
    } catch(e) {
        board.innerHTML = `<div class="text-red-400 text-center py-10">加载失败：${e.message}</div>`;
    }
}

// ── 工具 ──────────────────────────────────────────────────────
function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl shadow-2xl z-[200] text-sm font-bold text-white transition-all ${isError ? 'bg-rose-600' : 'bg-slate-800'}`;
    el.classList.remove('hidden');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.add('hidden'), 3000);
}
</script>
</body>
</html>
